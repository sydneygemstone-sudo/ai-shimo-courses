    button:focus-visible,a:focus-visible,input:focus-visible{outline:4px solid rgba(42,106,158,.28);outline-offset:3px}
    .chooser{height:100dvh;padding:max(22px,env(safe-area-inset-top)) max(28px,env(safe-area-inset-right)) max(22px,env(safe-area-inset-bottom)) max(28px,env(safe-area-inset-left));display:grid;grid-template-rows:auto 1fr auto;gap:18px;background:
      radial-gradient(circle at 12% 12%,#fff 0 7%,transparent 8%),radial-gradient(circle at 90% 16%,#dff4ff 0 11%,transparent 12%),linear-gradient(145deg,#fffdf7,#fff1ce)}
    .chooser-top{display:flex;justify-content:space-between;align-items:center;gap:16px}.mini-brand{display:flex;align-items:center;gap:10px;font-weight:900}.mini-dot{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:#fff;border:2px solid var(--line);box-shadow:0 6px 18px rgba(95,64,28,.1)}
    .quiet-link{font-size:15px;text-decoration:none;color:var(--soft);padding:10px 14px;border-radius:999px;border:2px solid var(--line);background:rgba(255,255,255,.72)}
    .chooser-main{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.8fr);align-items:center;gap:4vw;width:min(1240px,100%);margin:auto}
    .chooser-copy h1{font-family:var(--story);font-size:clamp(54px,6.6vw,96px);line-height:1.02;letter-spacing:-.05em;margin:0 0 16px;color:var(--green)}
    .chooser-copy p{font-size:clamp(22px,2.1vw,32px);line-height:1.45;margin:0;color:var(--soft);max-width:760px}.chooser-copy strong{color:var(--gold)}
    .route-list{display:grid;gap:16px}.route{display:grid;grid-template-columns:76px 1fr auto;align-items:center;gap:18px;padding:22px;border:3px solid var(--line);border-radius:28px;background:rgba(255,253,248,.92);box-shadow:var(--shadow);text-decoration:none;text-align:left;cursor:pointer;transition:.2s ease}
    .route:hover{transform:translateY(-4px);border-color:var(--gold2)}.route.recommended{background:#fff4cf;border-color:#e7b955}.route-icon{width:72px;height:72px;border-radius:24px;display:grid;place-items:center;font-size:42px;background:var(--sky)}.route.recommended .route-icon{background:#ffe09a}
    .route b{display:block;font-size:clamp(22px,2vw,29px);margin-bottom:5px}.route span{display:block;color:var(--soft);font-size:17px;line-height:1.35}.route-go{font-size:34px;color:var(--gold)}
    .chooser-foot{text-align:center;color:var(--soft);font-size:15px}.chooser-mq{width:min(250px,30vw);margin:8px auto 0;filter:drop-shadow(0 20px 18px rgba(118,73,27,.16));animation:float 4s ease-in-out infinite}

    .deck{position:fixed;inset:0;display:grid;grid-template-rows:64px minmax(0,1fr) 76px;background:var(--cream)}
    .deck-top,.deck-bottom{display:flex;align-items:center;gap:12px;padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right));background:rgba(255,253,248,.96);z-index:20}
    .deck-top{justify-content:space-between;border-bottom:2px solid var(--line)}.deck-bottom{justify-content:space-between;border-top:2px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
    .deck-brand{display:flex;align-items:center;gap:10px;min-width:0}.deck-brand b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lesson-time{font-weight:900;color:var(--blue);white-space:nowrap}.top-actions,.nav-actions{display:flex;gap:9px;align-items:center}
    .icon-btn,.nav-btn{min-height:46px;border:2px solid var(--line);border-radius:15px;background:#fff;cursor:pointer;padding:8px 14px;font-weight:800}.nav-btn{min-width:118px;font-size:18px}.nav-btn.primary{background:var(--green);border-color:var(--green);color:#fff}.icon-btn:hover,.nav-btn:hover{border-color:var(--gold)}
    .slide-count{font-size:17px;color:var(--soft);font-variant-numeric:tabular-nums}.dots{display:flex;gap:6px;align-items:center;justify-content:center;flex:1}.dot{width:10px;height:10px;border:0;padding:0;border-radius:99px;background:#decdb1;cursor:pointer}.dot.done{background:#efbd52}.dot.active{width:30px;background:var(--green)}
    .stage{position:relative;min-height:0;overflow:hidden}.slide{height:100%;padding:clamp(28px,4.5vw,70px) clamp(30px,7vw,108px);display:grid;align-content:center;position:relative;overflow:hidden;animation:slideIn .4s ease}.slide::before{content:"";position:absolute;width:26vw;height:26vw;min-width:250px;min-height:250px;border-radius:50%;right:-10vw;top:-13vw;background:rgba(255,255,255,.42)}
    .tone-cream{background:linear-gradient(145deg,#fffdf7,#fff2d8)}.tone-sky{background:linear-gradient(145deg,#f7fcff,var(--sky))}.tone-mint{background:linear-gradient(145deg,#fbfffc,var(--mint))}.tone-peach{background:linear-gradient(145deg,#fffaf5,var(--peach))}.tone-pink{background:linear-gradient(145deg,#fffafd,var(--pink))}.tone-yellow{background:linear-gradient(145deg,#fffdf4,#fff0ad)}
    .slide-inner{width:min(1220px,100%);margin:auto;position:relative;z-index:2}.center{text-align:center}.scene{display:grid;grid-template-columns:minmax(240px,.72fr) minmax(0,1.28fr);align-items:center;gap:clamp(24px,5vw,80px)}
    .mq-wrap{display:grid;justify-items:center;align-items:center}.mq{width:clamp(170px,22vw,300px);height:auto;filter:drop-shadow(0 20px 16px rgba(111,67,24,.18));animation:float 4s ease-in-out infinite}.mq.sidekick{width:clamp(110px,12vw,165px)}
    .bubble{position:relative;background:var(--paper);border:4px solid #e3c79c;border-radius:32px;padding:clamp(24px,3vw,42px);font-family:var(--story);font-size:clamp(34px,3.8vw,58px);line-height:1.28;color:#704b20;box-shadow:var(--shadow)}.bubble::before{content:"";position:absolute;left:-27px;top:48%;width:42px;height:42px;background:var(--paper);border-left:4px solid #e3c79c;border-bottom:4px solid #e3c79c;transform:rotate(45deg)}
    .eyebrow{font-size:clamp(16px,1.4vw,21px);font-weight:900;letter-spacing:.12em;color:var(--gold);margin-bottom:12px}.big-title{font-family:var(--story);font-size:clamp(54px,6.4vw,94px);line-height:1.05;letter-spacing:-.045em;color:var(--green);margin:0}.subline{font-size:clamp(26px,2.6vw,39px);line-height:1.38;margin:18px auto 0;max-width:980px;color:var(--soft)}.one-line{font-family:var(--story);font-size:clamp(42px,4.8vw,70px);line-height:1.22;margin:0;text-align:center;color:var(--green)}
    .choices{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin:34px auto 0;max-width:1050px}.choice{min-height:120px;border:4px solid var(--line);border-radius:28px;background:#fff;padding:18px;font-size:clamp(21px,2.2vw,32px);font-weight:900;cursor:pointer;box-shadow:0 10px 30px rgba(103,72,37,.08)}.choice:hover{transform:translateY(-3px);border-color:var(--gold2)}.choice.correct{border-color:#4b8e6c;background:#e9f9ef}.choice.wrong{border-color:#df8679;background:#fff0ec}.choice .emoji{display:block;font-size:clamp(44px,5vw,70px);margin-bottom:8px}
    .feedback{min-height:42px;margin:22px auto 0;font-size:clamp(20px,2vw,28px);font-weight:800;text-align:center;color:var(--blue)}
    .rule-row,.loop-row{display:flex;justify-content:center;align-items:center;gap:clamp(12px,2.2vw,28px);margin-top:36px;flex-wrap:wrap}.rule-pill,.loop-step{min-width:180px;padding:22px 24px;border:3px solid var(--line);border-radius:24px;background:#fff;text-align:center;font-size:clamp(22px,2vw,30px);font-weight:900}.rule-pill span,.loop-step span{display:block;font-size:46px;margin-bottom:8px}.arrow{font-size:38px;color:var(--gold);font-weight:900}
    .tool-shell{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr);gap:18px}.tool-head{display:flex;align-items:center;gap:14px}.tool-head .mq{width:86px}.tool-head h2{font-size:clamp(30px,3vw,46px);margin:0;color:var(--green)}.tool-head p{font-size:19px;margin:2px 0 0;color:var(--soft)}
    .trainer{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:stretch}.bucket{border:4px solid var(--line);border-radius:30px;background:#fff;padding:22px;display:grid;grid-template-rows:auto 1fr auto;text-align:center;min-height:260px}.bucket.sun{border-color:#efbd52;background:#fff9df}.bucket.forest{border-color:#69a77e;background:#edf9f0}.bucket h3{font-size:clamp(27px,2.8vw,40px);margin:0}.samples{display:flex;flex-wrap:wrap;justify-content:center;align-content:center;gap:10px;font-size:42px;min-height:80px}.tool-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.big-btn{min-height:58px;border:0;border-radius:18px;padding:13px 24px;background:var(--green);color:#fff;font-size:clamp(20px,2vw,28px);font-weight:900;cursor:pointer;box-shadow:0 9px 0 #173a2a}.big-btn:active{transform:translateY(5px);box-shadow:0 4px 0 #173a2a}.big-btn.gold{background:var(--gold2);color:#49300d;box-shadow:0 9px 0 #c18322}.big-btn.sky{background:#4d99c8;box-shadow:0 9px 0 #2e688d}.big-btn.light{background:#fff;color:var(--ink);border:3px solid var(--line);box-shadow:none}.trainer-status{grid-column:1/-1;text-align:center;font-size:clamp(20px,2vw,28px);font-weight:900;color:var(--blue);min-height:36px}
    .sensor{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:center}.sensor-control{border:4px solid #b7d8eb;border-radius:30px;background:#fff;padding:28px}.sensor-control label{display:flex;justify-content:space-between;font-size:clamp(24px,2.3vw,34px);font-weight:900;margin-bottom:18px}.sensor-control input{width:100%;accent-color:var(--blue)}.signal{grid-column:1/-1;background:#d8e2e6;border-radius:99px;height:36px;overflow:hidden;border:4px solid #fff}.signal span{display:block;height:100%;width:70%;background:linear-gradient(90deg,#e7776b,#f0bd4f,#5aa879);transition:.2s}.signal-result{grid-column:1/-1;text-align:center;font-size:clamp(25px,2.6vw,38px);font-weight:900;color:var(--green)}
    .external-tool{height:100%;display:grid;place-items:center;text-align:center}.external-tool h2{font-family:var(--story);font-size:clamp(52px,6vw,88px);margin:0;color:var(--green)}.external-tool p{font-size:clamp(22px,2.2vw,31px);color:var(--soft);margin:14px 0 26px}.external-tool .big-btn{font-size:clamp(26px,2.8vw,38px);padding:18px 34px;text-decoration:none}.fallback-link{display:block;margin:18px auto 0;border:0;background:transparent;color:var(--blue);font-weight:800;text-decoration:underline;cursor:pointer}
    .doodle{width:min(900px,100%);height:min(52vh,460px);border:5px dashed #9ecce5;border-radius:28px;background:#fff;touch-action:none}.doodle-actions{display:flex;justify-content:center;gap:12px;margin-top:12px}.debug-card{width:min(900px,100%);margin:25px auto 0;border:4px solid var(--line);background:#fff;border-radius:32px;padding:clamp(24px,4vw,48px);text-align:center}.debug-card .case{font-size:clamp(58px,7vw,100px);margin-bottom:16px}.debug-card h3{font-size:clamp(27px,3vw,42px);margin:0}.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:30px}.compare-btn{min-height:240px;border:4px solid var(--line);border-radius:32px;background:#fff;padding:25px;cursor:pointer}.compare-btn b{display:block;font-size:clamp(30px,3.2vw,47px);color:var(--green)}.compare-btn span{display:block;font-size:clamp(19px,1.9vw,27px);color:var(--soft);margin-top:12px}
    .teacher-panel{position:fixed;z-index:60;left:4vw;right:4vw;bottom:88px;max-height:46vh;overflow:auto;border:4px solid #d7a440;border-radius:26px;background:#fffdf8;padding:22px 26px;box-shadow:0 30px 80px rgba(54,35,16,.28)}.teacher-panel header{display:flex;justify-content:space-between;gap:14px;align-items:center}.teacher-panel h3{margin:0;color:var(--green)}.teacher-panel p{font-size:18px;line-height:1.6;margin:12px 0 0}.teacher-panel button{border:0;background:transparent;font-size:27px;cursor:pointer}
    @keyframes float{50%{transform:translateY(-8px) rotate(1deg)}}@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
    @media(max-width:820px),(orientation:portrait){.chooser-main{grid-template-columns:1fr}.chooser-copy{text-align:center}.chooser-mq{display:none}.route{grid-template-columns:64px 1fr auto;padding:17px}.route-icon{width:60px;height:60px;font-size:34px}.deck{grid-template-rows:58px minmax(0,1fr) 68px}.deck-brand span{display:none}.slide{padding:24px 24px 28px}.scene{grid-template-columns:1fr;gap:12px;text-align:center}.mq{width:130px}.bubble::before{display:none}.bubble{font-size:clamp(28px,7vw,42px);padding:20px}.choices{grid-template-columns:1fr;gap:10px;margin-top:18px}.choice{min-height:74px}.choice .emoji{display:inline;margin:0 8px 0 0;font-size:32px}.trainer,.sensor,.compare-grid{grid-template-columns:1fr}.bucket{min-height:180px}.nav-btn{min-width:80px}.dots{display:none}.optional{display:none}.tool-head .mq{width:62px}.slide-count{font-size:14px}.doodle{height:42vh}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>

  <script>
  (()=>{
    const $=id=>document.getElementById(id);
    const mq=face=>`<svg class="mq ${face==='sidekick'?'sidekick':''}" viewBox="0 0 200 200" aria-label="毛球"><use href="#mq-${face==='sidekick'?'idle':face}"/></svg>`;
    const slides=[
      {id:'h01',type:'cover',tone:'yellow',time:'0–2 分钟',title:'毛球总是认错！',sub:'60 分钟，把它训练到过关。',face:'excited',note:'照念：毛球今天总把能量球认错。我们不是来听答案，而是要把它真的教会。追问：你觉得训练 AI 的第一步是什么？'},
      {id:'h02',type:'question',tone:'cream',time:'2–4 分钟',prompt:'训练毛球，先做哪一步？',choices:[['☀️','只喂太阳','wrong'],['☀️🌿','两类都喂','correct'],['📝','直接考试','wrong']],answer:'两类都要有例子，毛球才有东西可以比较。',face:'idle',note:'先让孩子站队，不要提前揭晓。选完才点答案。追问：如果只见过太阳，它怎么知道森林是什么？'},
      {id:'h03',type:'rules',tone:'mint',time:'4–5 分钟',title:'今天只过三关',items:[['☀️🌿','分清两类'],['🆕','用新题考'],['🛡️','不用真人资料']],face:'happy',note:'成功标准：不是答对一次，而是用没见过的新题连续通过。红线：不上传孩子姓名、照片、地址。'},
      {id:'h04',type:'trainer',tone:'yellow',time:'5–17 分钟',title:'毛球实模训练台',face:'idle',note:'让孩子轮流点击喂例子。每类至少两个，先训练，再测试。故意让第一次训练不完美，错误是本课的重要产物。'},
      {id:'h05',type:'question',tone:'pink',time:'17–20 分钟',prompt:'答对一次，就真的会了吗？',choices:[['🎉','会了！','wrong'],['🧪','还要新题','correct'],['🔁','把旧题再考一次','wrong']],answer:'考试要用毛球没见过的新题。',face:'idle',note:'要求孩子指出哪颗球从没进过训练集。把“训练题”和“考试题”分开。'},
      {id:'h06',type:'loop',tone:'cream',time:'20–23 分钟',title:'真正的训练循环',items:[['🍎','例子＋标签'],['⚙️','训练'],['🆕','新题测试'],['🔧','修好再训']],face:'happy',note:'全班一起读四个动词：喂、训、考、修。不要解释算法。'},
      {id:'h07',type:'question',tone:'sky',time:'23–24 分钟',prompt:'毛球忽然变笨，先查哪里？',choices:[['🌑','太暗了','correct'],['🔊','太吵了','correct'],['😤','它偷懒','wrong']],answer:'先检查它看见、听见了什么。',face:'idle',note:'这里允许两个正确答案。点太暗、太吵都算对；“偷懒”用于去人格化。'},
      {id:'h08',type:'sensor',tone:'sky',time:'24–29 分钟',title:'输入信号实验台',face:'idle',note:'一次只拖一个滑杆。先把光线拉低，再恢复；再把噪声拉高。让孩子用“因为输入……”解释变化。'},
      {id:'h09',type:'question',tone:'mint',time:'29–31 分钟',prompt:'模型没换，分数为什么掉了？',choices:[['📷🎤','输入变差','correct'],['🧠','知识消失','wrong'],['🎲','纯粹运气','wrong']],answer:'输入先坏了，结果也会跟着坏。',face:'happy',note:'把失败归因分层：先查输入，再查数据和标签，最后才查模型。'},
      {id:'h10',type:'question',tone:'peach',time:'31–32 分钟',prompt:'AutoDraw 第几笔会猜中？',choices:[['1️⃣','第一笔','guess'],['3️⃣','第三笔','guess'],['6️⃣','第六笔','guess']],answer:'先押一个数，再去实验！',face:'excited',note:'这一页没有标准答案。让每个孩子先押一个数字，再打开工具，用真实结果验证。'},
      {id:'h11',type:'external',tone:'peach',time:'32–38 分钟',title:'AutoDraw',sub:'画几笔，看它推荐什么。',url:'https://www.autodraw.com/',button:'打开 AutoDraw ↗',fallback:'autodraw',face:'happy',note:'每人只画猫、鱼或自行车之一。回来后只问：第几笔出现了正确建议？断网则点本地猜图。'},
      {id:'h12',type:'question',tone:'sky',time:'38–40 分钟',prompt:'改变轮廓，它还认得吗？',choices:[['✅','一定认得','guess'],['❌','一定认不得','guess'],['🧪','画了才知道','correct']],answer:'保留意思，故意换一种画法。',face:'idle',note:'先画典型版本，再画夸张/变形版本。强调这是测试模型见没见过这种变化。'},
      {id:'h13',type:'external',tone:'sky',time:'40–47 分钟',title:'Quick, Draw!',sub:'一轮典型，一轮变形。',url:'https://quickdraw.withgoogle.com/',button:'打开 Quick, Draw! ↗',fallback:'quickdraw',face:'excited',note:'AutoDraw 和 Quick Draw 必须是两个不同入口。第一轮正常画，第二轮保留意思但改变轮廓。断网使用本地限时猜图。'},
      {id:'h14',type:'compare',tone:'cream',time:'47–50 分钟',title:'它们在做同一件事吗？',face:'idle',note:'答案：AutoDraw 根据草图推荐标准图标；Quick Draw 直接猜类别。让孩子先选再揭晓。'},
      {id:'h15',type:'debug',tone:'mint',time:'50–57 分钟',title:'三案调试局',face:'idle',note:'三案逐个出现：暗光听错=输入；只见白猫=数据；苹果标香蕉=标签。每案都必须问“怎么修、用什么新题重测？”'},
      {id:'h16',type:'finish',tone:'yellow',time:'57–60 分钟',title:'真正的驯养师',sub:'会检查、会修好、会再测。',face:'excited',note:'出口句每人补一句：下次 AI 出错，我会先检查____。最后强调：毛球不是魔法，也不是永远正确的权威。'}
    ];
    const state={index:0,sun:0,forest:0,trained:false,tested:0,debug:0};

    function scene(prompt,face='idle'){return `<div class="scene"><div class="mq-wrap">${mq(face)}</div><div class="bubble">${prompt}</div></div>`}
    function choices(items,answer){return `<div class="choices">${items.map(([emoji,label,result])=>`<button class="choice" type="button" data-result="${result}"><span class="emoji">${emoji}</span>${label}</button>`).join('')}</div><div class="feedback" id="feedback">先选，再揭晓。</div><template id="answerText">${answer}</template>`}
    function toolHead(title,face='idle',sub='动手试一试'){return `<div class="tool-head">${mq('sidekick')}<div><h2>${title}</h2><p>${sub}</p></div></div>`}

    function render(){const s=slides[state.index];$('lessonTime').textContent=s.time;$('slideCount').textContent=`${state.index+1} / ${slides.length}`;$('teacherText').textContent=s.note;$('prevBtn').disabled=state.index===0;$('nextBtn').textContent=state.index===slides.length-1?'回到入口':'下一页 →';$('stage').innerHTML=`<article class="slide tone-${s.tone}"><div class="slide-inner">${renderType(s)}</div></article>`;renderDots();bindSlide(s)}
    function renderType(s){
      if(s.type==='cover'||s.type==='finish')return `<div class="center">${mq(s.face)}<div class="eyebrow">${s.type==='cover'?'三年级 · 一小时高阶版':'训练完成 · TRAIN'}</div><h1 class="big-title">${s.title}</h1><p class="subline">${s.sub}</p></div>`;
      if(s.type==='question')return `${scene(s.prompt,s.face)}${choices(s.choices,s.answer)}`;
      if(s.type==='rules')return `<div class="center">${mq('sidekick')}<h2 class="one-line">${s.title}</h2><div class="rule-row">${s.items.map(x=>`<div class="rule-pill"><span>${x[0]}</span>${x[1]}</div>`).join('')}</div></div>`;
      if(s.type==='loop')return `<div class="center"><h2 class="one-line">${s.title}</h2><div class="loop-row">${s.items.map((x,i)=>`${i?'<span class="arrow">→</span>':''}<div class="loop-step"><span>${x[0]}</span>${x[1]}</div>`).join('')}</div>${mq('sidekick')}</div>`;
      if(s.type==='trainer')return `<div class="tool-shell">${toolHead(s.title,'idle','喂例子 → 训练 → 用新题考试')}<div class="trainer"><section class="bucket sun"><h3>☀️ 太阳能量</h3><div class="samples" id="sunSamples"></div><button class="big-btn gold" id="addSun" type="button">＋ 喂一个例子</button></section><section class="bucket forest"><h3>🌿 森林能量</h3><div class="samples" id="forestSamples"></div><button class="big-btn" id="addForest" type="button">＋ 喂一个例子</button></section><div class="tool-actions"><button class="big-btn sky" id="trainModel" type="button">⚙️ 训练毛球</button><button class="big-btn light" id="testModel" type="button">🆕 新题考试</button></div><div class="trainer-status" id="trainerStatus"></div></div></div>`;
      if(s.type==='sensor')return `<div class="tool-shell">${toolHead(s.title,'idle','一次只改变一个条件')}<div class="sensor"><section class="sensor-control"><label>☀️ 光线 <output id="lightOut">75</output></label><input id="light" type="range" min="0" max="100" value="75"></section><section class="sensor-control"><label>🔊 噪声 <output id="noiseOut">20</output></label><input id="noise" type="range" min="0" max="100" value="20"></section><div class="signal"><span id="signalBar"></span></div><div class="signal-result" id="signalResult"></div></div></div>`;
      if(s.type==='external')return `<div class="external-tool" id="externalTool"><div>${mq(s.face)}<h2>${s.title}</h2><p>${s.sub}</p><a class="big-btn" href="${s.url}" target="_blank" rel="noopener">${s.button}</a><button class="fallback-link" type="button" id="fallbackBtn">没网络？打开本地猜图</button></div></div>`;
      if(s.type==='compare')return `<div class="center"><h2 class="one-line">${s.title}</h2><div class="compare-grid"><button class="compare-btn" type="button" data-compare="auto"><b>AutoDraw</b><span>推荐标准图标</span></button><button class="compare-btn" type="button" data-compare="quick"><b>Quick, Draw!</b><span>猜你的类别</span></button></div><div class="feedback" id="feedback">点一张，听毛球怎么说。</div></div>`;
      if(s.type==='debug')return `<div class="center"><h2 class="one-line">${s.title}</h2><div class="debug-card" id="debugCard"></div></div>`;
      return '';
    }

    function bindSlide(s){
      if(s.type==='question')$('stage').querySelectorAll('[data-result]').forEach(btn=>btn.onclick=()=>{const result=btn.dataset.result;const all=$('stage').querySelectorAll('[data-result]');if(result!=='guess'){all.forEach(x=>x.classList.remove('correct','wrong'));btn.classList.add(result==='correct'?'correct':'wrong')}const msg=result==='correct'||result==='guess'?$('answerText').content.textContent:'毛球挠挠头：再想想训练和考试有什么不同？';$('feedback').textContent=msg});
      if(s.type==='trainer')bindTrainer();
      if(s.type==='sensor')bindSensor();
      if(s.type==='external')$('fallbackBtn').onclick=()=>renderDoodle(s.fallback);
      if(s.type==='compare')$('stage').querySelectorAll('[data-compare]').forEach(b=>b.onclick=()=>{$('feedback').textContent=b.dataset.compare==='auto'?'AutoDraw：我在推荐一个更标准的图标。':'Quick, Draw!：我在猜你画的是什么类别。';b.classList.add('correct')});
      if(s.type==='debug')renderDebug();
    }
    function bindTrainer(){
      const draw=()=>{$('sunSamples').textContent='☀️'.repeat(state.sun);$('forestSamples').textContent='🌿'.repeat(state.forest)};
      $('addSun').onclick=()=>{state.sun=Math.min(6,state.sun+1);state.trained=false;draw();$('trainerStatus').textContent=`太阳 ${state.sun} 个 · 森林 ${state.forest} 个`};
      $('addForest').onclick=()=>{state.forest=Math.min(6,state.forest+1);state.trained=false;draw();$('trainerStatus').textContent=`太阳 ${state.sun} 个 · 森林 ${state.forest} 个`};
      $('trainModel').onclick=()=>{if(state.sun<2||state.forest<2){$('trainerStatus').textContent='两边都至少喂 2 个例子。';return}state.trained=true;$('trainerStatus').textContent='训练完成！现在用新题考试。'};
      $('testModel').onclick=()=>{if(!state.trained){$('trainerStatus').textContent='还没训练，毛球只能乱猜。';return}state.tested++;const balanced=Math.abs(state.sun-state.forest)<=2;$('trainerStatus').textContent=balanced?`第 ${state.tested} 个新题：毛球答对了！还要继续测。`:'毛球犹豫了：两类例子太不平衡。'};draw();$('trainerStatus').textContent=state.sun+state.forest?`太阳 ${state.sun} 个 · 森林 ${state.forest} 个`:'先给两边都喂例子。';
    }
    function bindSensor(){const update=()=>{const light=+$('light').value,noise=+$('noise').value,score=Math.max(2,Math.round(light*.7+(100-noise)*.3));$('lightOut').textContent=light;$('noiseOut').textContent=noise;$('signalBar').style.width=`${score}%`;$('signalResult').textContent=score>70?'输入很清楚，毛球有把握。':score>40?'毛球有点犹豫……':'看不清、听不清，先修输入！'};$('light').oninput=update;$('noise').oninput=update;update()}
    function renderDoodle(kind){$('externalTool').innerHTML=`<div><h2>${kind==='autodraw'?'本地猜图':'本地限时画'}</h2><canvas class="doodle" id="doodle" width="900" height="450" aria-label="画板"></canvas><div class="doodle-actions"><button class="big-btn light" id="clearDoodle" type="button">清空</button><button class="big-btn" id="guessDoodle" type="button">毛球来猜</button></div><div class="feedback" id="feedback">用手指或鼠标画一画。</div></div>`;const c=$('doodle'),ctx=c.getContext('2d');ctx.lineWidth=10;ctx.lineCap='round';ctx.strokeStyle='#2a6a9e';let drawing=false,strokes=0;const point=e=>{const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return[(p.clientX-r.left)*c.width/r.width,(p.clientY-r.top)*c.height/r.height]};const start=e=>{drawing=true;strokes++;ctx.beginPath();ctx.moveTo(...point(e));e.preventDefault()};const move=e=>{if(!drawing)return;ctx.lineTo(...point(e));ctx.stroke();e.preventDefault()};const end=()=>drawing=false;c.addEventListener('pointerdown',start);c.addEventListener('pointermove',move);addEventListener('pointerup',end);$('clearDoodle').onclick=()=>{ctx.clearRect(0,0,c.width,c.height);strokes=0;$('feedback').textContent='重新画一画。'};$('guessDoodle').onclick=()=>{$('feedback').textContent=strokes<3?'毛球猜：太阳？再多画几笔让我看清。':strokes<7?'毛球猜：猫或鱼？我还不太确定。':'毛球猜了一个答案——但自信不代表正确！'}}
    function renderDebug(){const cases=[{icon:'🌑📷',q:'画面太暗，错在哪？',a:'input',label:'输入',fix:'先把光线调好，再测。'},{icon:'🐈🐈🐈',q:'只见过白猫，错在哪？',a:'data',label:'数据',fix:'补黑猫、侧脸猫等新例子。'},{icon:'🍎➡️🍌',q:'苹果标成香蕉，错在哪？',a:'label',label:'标签',fix:'改正标签，重新训练。'}],item=cases[state.debug%cases.length];$('debugCard').innerHTML=`<div class="case">${item.icon}</div><h3>${item.q}</h3><div class="choices"><button class="choice" data-debug="input">输入</button><button class="choice" data-debug="data">数据</button><button class="choice" data-debug="label">标签</button></div><div class="feedback" id="feedback">先判断，再修。</div>`;$('debugCard').querySelectorAll('[data-debug]').forEach(b=>b.onclick=()=>{if(b.dataset.debug===item.a){b.classList.add('correct');$('feedback').textContent=`答对：${item.fix}`;setTimeout(()=>{state.debug++;renderDebug()},900)}else{b.classList.add('wrong');$('feedback').textContent='再看一眼：问题发生在哪一层？'}})}
    function renderDots(){$('dots').innerHTML=slides.map((_,i)=>`<button class="dot ${i<state.index?'done':''} ${i===state.index?'active':''}" type="button" data-go="${i}" aria-label="第 ${i+1} 页"></button>`).join('');$('dots').querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{state.index=+b.dataset.go;render()})}
    function start(){state.index=0;$('chooser').hidden=true;$('deck').hidden=false;render()}
    function home(){$('deck').hidden=true;$('chooser').hidden=false;$('teacherPanel').hidden=true}
    $('startOlder').onclick=start;$('prevBtn').onclick=()=>{if(state.index>0){state.index--;render()}};$('nextBtn').onclick=()=>{if(state.index===slides.length-1)return home();state.index++;render()};$('homeBtn').onclick=home;$('teacherBtn').onclick=()=>{$('teacherPanel').hidden=!$('teacherPanel').hidden};$('closeTeacher').onclick=()=>$('teacherPanel').hidden=true;$('fullBtn').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();
    addEventListener('keydown',e=>{if($('deck').hidden)return;if(e.key==='ArrowRight'){e.preventDefault();$('nextBtn').click()}if(e.key==='ArrowLeft'){e.preventDefault();$('prevBtn').click()}if(e.key.toLowerCase()==='s')$('teacherBtn').click();if(e.key==='Escape')$('teacherPanel').hidden=true});
    let x=0;$('stage').addEventListener('touchstart',e=>x=e.changedTouches[0].clientX,{passive:true});$('stage').addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-x;if(Math.abs(d)>70)(d<0?$('nextBtn'):$('prevBtn')).click()},{passive:true});
  })();
  </script>
</body>
</html>
