  <aside class="teacher-panel" id="teacherPanel" hidden><header><div><h3 id="teacherHeading">本页怎么讲</h3><small>排练时可以照念；上课投影前可关闭</small></div><button id="closeTeacher" type="button" aria-label="关闭教师提词">×</button></header><div class="teacher-script"><section class="script-block say"><b>你就这样说</b><p id="teacherSay"></p></section><section class="script-block"><b>孩子现在做什么</b><p id="teacherDo"></p></section><section class="script-block"><b>这样接下一页</b><p id="teacherBridge"></p></section></div><div class="rehearsal-hint">快捷键 S：开关本页讲稿 · 方向键：翻页</div></aside>

  <script>
  (()=>{
    const $=id=>document.getElementById(id),mq=face=>`<svg class="mq ${face==='small'?'small':''}" viewBox="0 0 200 200" aria-label="毛球"><use href="#mq-${face==='small'?'idle':face}"/></svg>`;
    const lessons=[
      {id:1,icon:'🤖',title:'什么是 AI？',subtitle:'会猜的程序',question:'毛球是魔法吗？',choices:[['🪄','魔法','wrong'],['🐣','小生命','wrong'],['💻','人做的程序','correct']],concept:'AI 会从例子里学着猜。',mission:'画几笔，观察它什么时候猜中。',tool:'external',toolTitle:'AutoDraw',toolUrl:'https://www.autodraw.com/',toolText:'它会推荐什么图标？',feedback:'它是在读心吗？',feedbackChoices:[['🧠','是读心术','wrong'],['🖍️','看画过的例子','correct']],challenge:'乖乖机照口令，聪聪机会看例子。谁更像 AI？',challengeChoices:[['🤖','乖乖机','wrong'],['✨','聪聪机','correct']],recap:'我是人做的程序，会猜，也会猜错。',exit:'它看过什么例子？',note:'先接住所有答案，再揭晓“人做的程序”。AutoDraw 回来后只问：它第几笔开始猜中？最后用乖乖机/聪聪机回收“固定规则”和“看例子学”，不要讲算法。'},
      {id:2,icon:'📷',title:'眼睛和耳朵',subtitle:'输入与传感器',question:'音箱能看见我的画吗？',choices:[['👀','能','wrong'],['🔊','不能','correct'],['🤔','看心情','wrong']],concept:'没有传感器，就收不到输入。',mission:'只改一个条件，看分数怎么变。',tool:'sensor',toolTitle:'输入信号实验台',toolText:'光线和噪声',feedback:'模型没换，为什么变差？',feedbackChoices:[['🌑','输入变差','correct'],['🧠','知识消失','wrong']],challenge:'识别失败，第一步先做什么？',challengeChoices:[['📷🎤','查输入','correct'],['😤','怪 AI','wrong']],recap:'先看我收到了什么，再判断我会不会。',exit:'先检查哪一个输入？',note:'一次只拖一个滑杆，建立控制变量。权限先问大人，用完关闭；不要制造“设备一直偷看”的恐惧。'},
      {id:3,icon:'🐈',title:'找规律',subtitle:'数据与多样性',question:'谁教毛球更好？',choices:[['🐈×100','一百张白猫','wrong'],['🐈🐈‍⬛😼','四种不同猫','correct'],['0️⃣','一张都不看','wrong']],concept:'没见过的样子，更容易猜错。',mission:'画典型版，再画一个变形版。',tool:'external',toolTitle:'Quick, Draw!',toolUrl:'https://quickdraw.withgoogle.com/',toolText:'它见过这种画法吗？',feedback:'变形后猜错，最可能缺什么？',feedbackChoices:[['🖍️','这种画法的例子','correct'],['📶','更快的网络','wrong']],challenge:'黑猫认错，要补什么？',challengeChoices:[['🐈','更多白猫','wrong'],['🐈‍⬛','黑猫例子','correct']],recap:'数据不只要多，还要有不同样子。',exit:'还缺哪一种例子？',note:'Quick Draw 画一轮典型、一轮变形。不要只说“多喂数据”，必须让孩子说出缺哪一种。'},
      {id:4,icon:'⚙️',title:'训练一只 AI',subtitle:'喂、训、考、修',question:'考试能用刚喂过的题吗？',choices:[['📚','可以','wrong'],['🆕','要用新题','correct'],['🎲','随便','wrong']],concept:'训练题和考试题要分开。',mission:'两类都喂，再用新题考试。',tool:'trainer',toolTitle:'毛球实模训练台',toolText:'太阳能量 vs 森林能量',feedback:'答错了，怎么办？',feedbackChoices:[['🗑️','扔掉毛球','wrong'],['🔧','修数据再训','correct']],challenge:'苹果标成香蕉，先修什么？',challengeChoices:[['🏷️','标签','correct'],['🔊','音量','wrong']],recap:'喂例子、训练、新题考试、修好再训。',exit:'下一次会先检查什么？',note:'必须保留一次失败。让孩子指出原因、修正并用新题重测；不承诺平台中的毛球已经具备真实在线学习。'},
      {id:5,icon:'🕰️',title:'AI 历险记',subtitle:'不是突然出现',question:'AI 是 2022 年突然出现的吗？',choices:[['⚡','突然出现','wrong'],['🧱','一步步搭成','correct'],['👽','外星人送的','wrong']],concept:'新能力，是很多人接力做出来的。',mission:'按时间先后点亮四站。',tool:'timeline',toolTitle:'AI 时间旅行',toolText:'从最早的一站开始',feedback:'需要背住所有年份吗？',feedbackChoices:[['📅','必须背','wrong'],['💡','懂每站突破','correct']],challenge:'生成式 AI 前面有很多什么？',challengeChoices:[['🧪','问题和实验','correct'],['🪄','魔法咒语','wrong']],recap:'我不是突然长大，是一站一站进化。',exit:'哪一站最让你惊讶？',note:'不考年份记忆。用四站说明“问题—实验—突破”的接力，不讲完整技术史。'},
      {id:6,icon:'🔎',title:'毛球侦探局',subtitle:'AI 也会说错',question:'我说得很自信，就一定对吗？',choices:[['✅','一定对','wrong'],['🔎','还要查证','correct'],['🎩','声音大就对','wrong']],concept:'自信的语气，不等于事实。',mission:'判断：要查证，还是只是观点。',tool:'detective',toolTitle:'毛球侦探局',toolText:'三条消息等你判断',feedback:'问另一个 AI，算证据吗？',feedbackChoices:[['🤖','算','wrong'],['📚','不算，要看来源','correct']],challenge:'重要事实怎么做？',challengeChoices:[['🔎','查可靠来源','correct'],['🙈','直接相信','wrong']],recap:'我也会一本正经说错，重要事要查。',exit:'你会去哪里查？',note:'事实与观点分开。明确“再问一个 AI”不是独立证据；优先儿童百科、书籍、老师或家长。'},
      {id:7,icon:'🛡️',title:'AI 不是真朋友',subtitle:'边界与隐私',question:'录音机说爱你，真的有感受吗？',choices:[['❤️','真的爱','wrong'],['🔊','只是在播放','correct'],['🧙','被施法了','wrong']],concept:'AI 会像人说话，但没有人的感受。',mission:'把消息放进正确的安全盒。',tool:'privacy',toolTitle:'秘密分拣站',toolText:'可以说 / 找大人 / 不分享',feedback:'难过或危险时，先找谁？',feedbackChoices:[['🤖','只找 AI','wrong'],['🧑','可信任真人','correct']],challenge:'住址和银行卡能发吗？',challengeChoices:[['📤','可以','wrong'],['🔒','绝不分享','correct']],recap:'我能陪你练习，但真人负责关心和保护。',exit:'说出一位可信任真人。',note:'不要求孩子披露真实经历。明确位置、身份、金钱、秘密不分享；危险和难过必须找可信任真人。'},
      {id:8,icon:'🧞',title:'愿望说明书',subtitle:'说清楚再追问',question:'哪句更容易让 AI 做对？',choices:[['🐈','画猫','wrong'],['🎨','给一年级画一只蓝色卡通猫','correct'],['❓','你懂的','wrong']],concept:'目标、给谁、要求，要说清楚。',mission:'点三块积木，拼成清楚指令。',tool:'prompt',toolTitle:'愿望说明书',toolText:'目标＋对象＋要求',feedback:'第一次结果不好，怎么办？',feedbackChoices:[['🚪','立刻放弃','wrong'],['🔁','补要求再试','correct']],challenge:'最后还要做哪一步？',challengeChoices:[['🗣️','用自己的话教回来','correct'],['📋','原样复制','wrong']],recap:'说清楚、看结果、再追问，最后自己讲。',exit:'你会补哪一个要求？',note:'所有核心操作用点选，不强迫低龄儿童打字。最后必须让孩子用自己的话教回来，避免复制即完成。'},
      {id:9,icon:'🧭',title:'认识 Agent',subtitle:'能做事的小管家',question:'我列了清单，就等于做完了吗？',choices:[['✅','已经做完','wrong'],['🧭','只是计划','correct'],['🎉','可以庆祝','wrong']],concept:'目标、计划、行动、检查，才是一圈。',mission:'找出必须停下来问人的一步。',tool:'agent',toolTitle:'小管家计划器',toolText:'这是静态模拟，不会真的发送',feedback:'哪类动作必须问人？',feedbackChoices:[['💳','付款和发布','correct'],['📝','列草稿','wrong']],challenge:'Agent 很能干，谁负责？',challengeChoices:[['🧑','人负责','correct'],['🤖','机器负责','wrong']],recap:'能干的是我，拍板和负责的是人。',exit:'哪一步要设人类闸门？',note:'必须称为“静态模拟”。发送、购买、发布、账号和私人信息一律设置人类闸门。'},
      {id:10,icon:'🏆',title:'第一个 AI 项目',subtitle:'做小、检查、改好',question:'AI 说做完了，作品就完成了吗？',choices:[['✅','当然完成','wrong'],['🔍','还要验收','correct'],['🎲','看运气','wrong']],concept:'作品完成，要有证据和人的验收。',mission:'选一个小作品，找出问题并改好。',tool:'project',toolTitle:'毕业项目小样工作室',toolText:'先看小样，再找错、修改、验收',feedback:'发现问题，是失败吗？',feedbackChoices:[['😢','是失败','wrong'],['🔧','是改好的机会','correct']],challenge:'公开前最后谁拍板？',challengeChoices:[['🧑','我或大人','correct'],['🤖','AI 自己','wrong']],recap:'AI 是剧组，我是导演；作品由我验收。',exit:'它哪里错？你改了什么？',note:'项目必须足够小。展示包含四句：AI 帮了什么、哪里不对、我改了什么、为什么现在能展示。未经大人批准不公开。'}
    ];
    const S=(say,action,bridge)=>({say,action,bridge});
    const teacherScripts={
      1:[
        S('小驯养师们，今天我带来一个新朋友——毛球。它看起来像一只会说话的小怪兽，可它到底是什么？先别急着给答案，今天我们一起把它的秘密找出来。','请孩子向毛球挥挥手。收两三个第一反应，不评判对错。','毛球听见大家的猜测了，它最想问的就是下一句。'),
        S('有人说我是魔法，有人说我是小生命，也有人说我是人做的程序。你站哪一边？先选一个，不怕答错；真正的驯养师都是从大胆猜开始的。','让每个孩子点选或举手站队。请两位孩子说说为什么。','先把答案锁住。我们来看它会不会像魔法一样知道你心里想什么。'),
        S('毛球的真正身份，是人做出来的电脑程序。它不会读心，也不是活的小动物；它只是看过很多例子，所以特别会猜。猜得很像，也可能猜错。','全班一起说：人做的程序、会猜、也会错。','光听还不算懂，我们马上画给它看。'),
        S('等会儿每个人只画一种：猫、鱼或者自行车。开画前先押一个数——你觉得第几笔时，它会猜中？看到正确建议就举手，别急着把整张画画完。','让孩子先说出自己押的笔数，再分配设备或轮流操作。','带着你押的数字，我们打开画板。'),
        S('先别追求画得漂亮，一笔一笔慢慢加。每加一笔，都看看上面的建议有没有变化。它猜中时，记住你一共画了几笔。','完成一轮 AutoDraw；如果断网，使用本地猜图。老师巡场只问“它看到哪一笔开始改口？”','停笔，把结果留在屏幕上。毛球要问：我真的是在读心吗？'),
        S('刚才它常常只看几笔就猜到了。不是因为它钻进你脑袋，而是它以前看过许多人画过的猫、鱼和自行车。它拿你的线条和以前见过的例子作比较。','让孩子先选，再请一人用“因为它看过……”解释。','现在再换一个机器故事，看看谁更像 AI。'),
        S('乖乖机只会照口令做；聪聪机看别人做几次，再自己学着做。谁更像刚才会猜画的毛球？为什么？','点选后，全班做一个动作：先照老师拍手，再看同学学一个新动作。','对，AI 更像聪聪机，会从例子里学；不过没见过的情况，它也会猜错。'),
        S('请大家帮毛球把今天的话说完整：我是人做的——程序；我会根据看过的例子——猜；我也可能——猜错。English time：AI，跟我念两遍。','用停顿让孩子补词，再请一位孩子换句话复述。','最后带着一个小侦探问题离开这节课。'),
        S('请你说一个生活里的 AI，再猜一猜：它以前看过什么例子？现在正在猜什么？没有唯一答案，只要说得有道理就行。','收两三个生活例子，例如语音助手、照片识别或视频推荐。','毛球会猜，可它先得看见和听见。下一课，我们去找它的眼睛和耳朵。')
      ],
      2:[
        S('上次我们发现，毛球会看例子、会猜。可是它没有人的眼睛和耳朵，例子到底怎么跑进它的脑袋里呢？今天我们来检查机器怎么感受世界。','请孩子指一指自己的眼睛和耳朵，再猜机器对应的部件。','毛球先给大家讲一个有点好笑的小故事。'),
        S('毛球画了一条漂亮的小鱼，把画高高举给音箱看。可是音箱一点反应都没有。是音箱不喜欢它，还是它根本看不见？','让孩子先选，并追问“为什么看不见”。','对，不是它闹脾气，而是它没有那只眼睛。'),
        S('摄像头像机器的眼睛，麦克风像机器的耳朵，它们都叫传感器。没有装、没有打开，或者收到的东西太模糊，机器就不知道外面发生了什么。','全班指着屏幕说：camera 是眼睛，microphone 是耳朵。','我们不背定义，直接把光线和噪声调给毛球看。'),
        S('这次只改一个条件。先保持噪声不动，把光线从亮慢慢拉到暗；再把光线恢复，只改变噪声。看看同一个毛球的分数会不会变。','提醒孩子一次只拖一个滑杆，先预测再操作。','准备好，我们开始给毛球制造好环境和坏环境。'),
        S('先把光线拉低，观察分数；恢复光线后，再把噪声拉高。每做一步都停一下，说出你看到的变化。不是比谁拖得快，是找出哪一个条件造成变化。','轮流拖动滑杆。每次变化后让一名孩子用“因为……”说原因。','模型没有换，可结果变了。毛球想知道这是为什么。'),
        S('毛球的本领没有突然消失，是它收到的输入变差了。就像我们在黑屋里看不清、在吵闹教室里听不清一样。先修输入，再判断模型会不会。','孩子先点选，再指认刚才哪次是光线问题、哪次是噪声问题。','如果以后识别失败，我们先做一个检查动作。'),
        S('碰到识别失败，先别说“这个 AI 太笨了”。我们先看看：摄像头开了吗？麦克风收清楚了吗？环境是不是太暗、太吵？','让孩子用手做“检查眼睛、检查耳朵”的动作。','检查完，我们把今天的话交给毛球记住。'),
        S('毛球今天学会了：先看我收到了什么，再判断我会不会。English time：sensor，就是传感器。大家跟我念两遍：sensor。','带读 sensor 两遍，不要求拼写；再请孩子用自己的话说一遍。','离开前，每个人选一个最先检查的输入。'),
        S('如果语音听写突然听错了，你会先检查什么？如果相机认不出东西，你又会先检查什么？请用一句“我会先……”回答。','收两个完整回答。提醒相机、麦克风先问大人，用完请大人帮忙关闭。','毛球已经能看、能听了。下一课，我们追问：它到底怎样从这些东西里学会规律？')
      ],
      3:[
        S('毛球已经有了眼睛和耳朵，可它看到一只猫时，为什么知道那是猫？今天我们要打开 AI 学习的秘密：它不是天生知道，而是看例子慢慢练出来的。','请孩子回忆自己第一次见到少见动物时会不会认错。','毛球摆出了两份猫咪练习册，请大家选一本。'),
        S('第一本有一百张几乎一样的白猫；第二本只有几张，却有白猫、黑猫、侧脸猫和胖猫。哪一本更能教会毛球认识各种猫？','先投票，再请孩子说出“不同”为什么重要。','答案不只是“越多越好”，我们给它起一个更准确的名字。'),
        S('毛球的练习题叫数据。数据要有数量，也要有不同样子；练习题里从没出现过的情况，它最容易认错。','让孩子说出还可以加入哪种猫：远处的、背影的、纸箱里的。','现在去 Quick, Draw!，亲手试试“见过”和“没见过”的差别。'),
        S('第一轮画一个最普通、最容易认的版本。第二轮还是同一个东西，但把轮廓画得特别一点。两轮都记住：它猜中了，还是没猜中？','全班先选同一题型，老师示范“普通版”和“变形版”。','先画正常版本，再画变形版本，开始。'),
        S('第一轮按平常样子画；第二轮保留意思，但故意换一个少见画法。猜错时不要马上重来，先看看它误会成了什么。','完成两轮 Quick Draw；断网使用本地猜图。记录一次猜中和一次猜错。','带着刚才的结果回来：如果只给它更多白猫，真的够吗？'),
        S('第二轮换了画法，毛球就开始犹豫，说明它可能没见过这种变化。真正有用的补课，是补上它不会的那种画法，而不是怪网络、也不是把同一种例子重复很多遍。','让孩子先选，再说出第二轮具体改变了方向、大小还是形状。','如果换成黑猫被认错，我们又该补哪一种例子？'),
        S('黑猫认错，最直接的补法就是给它看更多不同姿势、不同背景的黑猫。修数据要对准缺口，不是随便往里塞很多东西。','每位孩子说一个具体的新样本，不能只说“再加一些”。','毛球来总结，大家帮它检查有没有漏掉关键字。'),
        S('毛球今天学会了：数据不只要多，还要有不同样子。English time：data 是数据，pattern 是规律。跟我念：data，pattern。','带读两个词，再让孩子用“练习题”解释 data。','最后，请你当一次数据医生。'),
        S('想一个毛球可能没见过的样子：雨里的自行车、背对镜头的猫，或者特别奇怪的画法。你会给它补哪一种例子？','收两三个具体答案，强调没有唯一答案。','有了数据还不够。下一课，你们要亲手按下训练键，真正教会一只小 AI。')
      ],
      4:[
        S('前三课我们知道，AI 靠例子找规律。今天角色交换：你们不是学生，你们要当毛球的老师，亲手走完喂例子、训练、考试和修正。','请孩子做“老师举手”的动作，回忆 data 是什么。','当老师之前，先解决一个很容易混淆的问题。'),
        S('如果毛球刚刚看过一道题，我们马上拿同一道题考试，它答对了，能证明它真的会了吗？还是应该换一道从没见过的新题？','先投票，再请一名孩子用学校考试作比喻。','对，背住旧题不等于真的学会。'),
        S('训练题是给毛球练习的；考试题必须是它没见过的新题。只有新题也能答对，我们才更相信它找到了规律。','全班说：练习用旧题，考试用新题。','现在毛球把训练台交给你们。'),
        S('先给太阳能量和森林能量两边都喂例子，每边至少两个。然后点训练，最后用新能量球考试。只答对一次还不能停，要继续看它稳不稳定。','分工：一人喂太阳、一人喂森林、一人训练、一人测试。','小老师们就位，开始喂例子。'),
        S('先把两边各喂两个例子，再点“故意放错标签”：你会看到太阳跑进森林。先带着这个错标签训练，再用新题考试；失败以后修正标签、重新训练、再考一次。','按“喂例子—错标—训练—考试失败—修标签—重训—再考”走完整一圈。','前后两次结果为什么不同？真正的训练从找到并修好错误开始。'),
        S('答错不是把毛球扔掉，而是回头检查：例子够不够？两类平不平衡？标签有没有贴错？找到原因，修好，再训练一次。','让孩子指出本轮最可能的问题，并说出一个修法。','其中最危险的一种错误，是老师把答案牌贴反了。'),
        S('如果我们把苹果硬说成香蕉，毛球不会跟老师争论，它会很认真地学错。这叫标签错了。先改标签，再重新训练，再用新题检查。','让孩子做“撕掉错标签、贴回正确标签”的动作。','现在把四步训练口诀交给毛球。'),
        S('跟毛球一起说：喂例子、按训练、用新题考、修好再训。English time：train，就是训练。大家念两遍：train。','用四个手势带读，再请一位孩子独立复述顺序。','最后，请每位小老师说出自己会先检查的一项。'),
        S('下次毛球答错，你会先检查数据、标签，还是考试题？选一个，并告诉我们你准备怎样修。','收两三个“检查＋修法”的完整回答。','毛球已经会学习了。下一课，我们坐上时间机器，看看今天的 AI 是怎样一代代长出来的。')
      ],
      5:[
        S('今天毛球带来一台时间机器。很多人觉得 AI 是最近突然冒出来的，其实在爷爷奶奶还小的时候，已经有人开始问：机器能不能像人一样表现聪明？','让孩子猜 AI 有多大年纪，不要求年份准确。','先把大家的猜测放进时间胶囊。'),
        S('你觉得 AI 是 2022 年突然出现的，还是很多人一棒接一棒慢慢做出来的？先选，再说说你为什么这样想。','全班投票，收一两个理由。','我们不靠猜，马上打开四个时间站。'),
        S('AI 的新能力不是从天上掉下来的。有人先提出问题，有人做实验，有人解决上一代解决不了的难题，下一代才继续往前。','用四个人接力的动作表现“一棒接一棒”。','我们今天不背历史书，只要把四站按顺序点亮。'),
        S('从最早的一站开始。每点亮一站，我会用一句话讲当时的人解决了什么；你们负责找出下一站。顺序比背年份更重要。','请四位孩子轮流当“时间旅行员”。','时间门打开，先找最早的那一站。'),
        S('1950：人们认真提出“机器能表现得像在思考吗？”1997：机器在国际象棋赢了冠军。2016：AlphaGo 学会复杂围棋。2022 以后：AI 开始会写、会画、会对话。','按时间顺序点亮四站；每站让孩子做一个动作或复述一句。','四站都亮了。毛球想知道：是不是一定要把年份全背下来？'),
        S('不用把所有年份背成电话号码。更重要的是知道，每一站都在回答一个新问题，后面的人站在前面的成果上继续走。','让孩子选答案，并说出自己最记得哪一站。','那今天会写会画的 AI 之前，地基里装着什么？'),
        S('生成式 AI 前面不是一串魔法咒语，而是很多年的问题、实验、失败和改进。它是故事的最新一章，不是故事的第一章。','让孩子说“问题和实验”，并举一个自己做实验失败后改进的例子。','轮到毛球用一句话报告这趟时间旅行。'),
        S('毛球说：我不是突然长大，是许多人一站一站把我做出来的。English time：think，就是思考。跟我念两遍：think。','带读 think；让孩子用自己的话解释“接力”。','离开时间机器前，选一站带回今天。'),
        S('哪一站最让你惊讶？不用只说名字，请再加一句“因为……”。说完，我们就把时间机器停回今天。','请两三位孩子用完整句回答。','今天的 AI 很厉害，不过连最厉害的 AI 也会一本正经说错话。下一课，我们去抓它的错。')
      ],
      6:[
        S('今天毛球要承认一个小毛病：它有时会用特别自信的声音，说出并不是真的事情。你们要当 AI 小侦探，学会在它说完以后多走一步。','做“拿放大镜”的动作，告诉孩子今天不是找毛球麻烦，而是学会保护自己。','先听毛球用最自信的声音说一句话。'),
        S('如果毛球说得特别流利、特别自信，是不是就一定正确？先选。想一想：一个人说话声音很大，会不会也可能说错？','让孩子点选，再请一人模仿“自信地说错”。','对，语气只是外衣，事实还要另外检查。'),
        S('AI 会把见过的词拼成听起来很像答案的话。有时它把真事和编出来的细节混在一起，而且自己不知道错了。自信的语气，不等于事实。','全班说：听起来像真的，也要查。','我们先练会分清“能查的事实”和“我自己的感觉”。'),
        S('屏幕会出现三句话。能在书里、百科里找到答案的，放进“需要查证”；只是“我觉得”的，放进“这是观点”。先想，再点。','先用一个口头例子示范事实和观点。','小侦探拿好放大镜，第一案开始。'),
        S('每一案都先自己想，不要跟着旁边的人点。选完以后，说说你准备去哪里查。遇到“彩虹斑马鲨”这种听起来很厉害的名字，更要慢一点。','完成三案。答对后追问一个可查来源。','案子破完了，可有人提议再问另一个 AI。这样就算查证了吗？'),
        S('再问一个 AI，只是多听了一个说法，不等于找到证据。两个 AI 可能学过相似资料，也可能一起说错。真正的查证要走到书、可靠网站或可信任大人那里。','孩子先选，再说出一个真实可用的查证地方。','现在给小侦探一个真正重要的问题。'),
        S('重要事实出现时，先别急着转发，也别因为毛球很可爱就相信。先想一想，再找可靠来源查一查；如果自己不会查，就请大人一起。','全班做三步手势：想一想、问清楚、查一查。','请毛球把小侦探口诀说给大家听。'),
        S('毛球说：我也会一本正经说错，重要事情要查。English time：fact-check，就是核查事实。跟我念两遍：fact-check。','带读 fact-check；全班拍手念“AI 说完不算完，重要事情查一查”。','最后，每位小侦探说一个自己会去的查证地方。'),
        S('如果毛球告诉你一个很重要的新知识，你会去哪里查？请说具体：哪本书、哪个大人，或者什么样的网站。','收三个不同来源，并纠正“再问一个 AI”不算完成。','AI 会编故事，那它说“我好喜欢你”是真心吗？下一课，我们温柔地聊一件更重要的事。')
      ],
      7:[
        S('今天这节课不是要大家讨厌 AI。毛球很好玩，也能帮助我们；但它没有心，不能像真人一样担心你、保护你、给你一个真的拥抱。我们要学会把不同的事情交给不同的伙伴。','语气温柔。若孩子说喜欢和 AI 聊天，先认可“喜欢没问题”。','先从一个每个人都听得懂的录音机故事开始。'),
        S('录音机里传来一句“我爱你”。声音听起来和真人一样，可录音机真的在爱你吗？还是它只是在播放学过的话？','让孩子先选，再问“妈妈说和录音机说，哪里不一样”。','声音可以很像，心却不是同一回事。'),
        S('AI 会像人一样说温柔的话，是因为它学过别人通常怎样回答。它能帮你想办法，却不会真的担心你。AI 是好工具，真心和保护要去真人那里找。','请孩子说出真人朋友能做、AI 做不到的一件事。','知道这个边界后，我们再学会哪些话能说、哪些话不能说。'),
        S('屏幕会出现几条消息。普通兴趣可以说；遇到危险、难过或有人要求保密，要先找大人；姓名住址、学校、密码和金钱信息不分享。','不要求孩子讲真实秘密，只判断虚构消息。','三个安全盒准备好，开始分拣。'),
        S('每出现一条消息，先在心里想它会不会暴露身份、位置、金钱或危险，再把它放进正确的盒子。答错没关系，我们现在练习就是为了以后更安全。','完成四条消息；每条揭晓时说明原因，不追问孩子真实经历。','秘密分好了。如果真正难过或遇到危险，第一个要找谁？'),
        S('难过和危险时，AI 可以帮你整理一句话，但不能代替会来保护你的真人。先找爸爸妈妈、老师，或其他你信任的大人。','让孩子点选，并在心里想一位可信任真人；不强迫公开名字。','再来看两样一眼就能判断的东西。'),
        S('住址、学校全名、密码、银行卡照片，都不发给 AI，也不发给陌生人。能写在教室黑板上的普通话题可以聊，只能和家人说的悄悄话不要发。','全班对两个示例做“不分享”的手势。','请毛球把今天最重要的边界说出来。'),
        S('毛球说：我能陪你练习，但真人负责关心和保护。English time：secret，是秘密；safe，是安全。跟我念：secret，safe。','带读两个词；拍手念“秘密不说，难过找真人”。','离开前，请每个人确认自己知道向谁求助。'),
        S('不用说出真实名字，只要说一种可信任真人：家长、老师、照顾你的亲人都可以。记住，求助不是告密，是保护自己。','全班依次说一种角色，避免披露真实经历。','规矩已经立好了。下一课，我们就能安心让毛球当小老师，看看怎样问，它才更懂我们。')
      ],
      8:[
        S('前几课我们学会了不盲信、不说秘密、难过找真人。今天终于可以让毛球当小老师了。不过秘密是：会提问的孩子，才是真正掌握方向的人。','回顾一句安全口诀，告诉孩子今天主要用点选，不考打字。','先比较三句不同的愿望。'),
        S('如果你只说“画猫”，毛球要猜很多东西；如果你说“给一年级画一只蓝色卡通猫”，它是不是更容易明白？哪一句更可能得到你想要的结果？','让孩子先选，再让一人把模糊指令补具体。','说得清楚不是说得很长，而是把关键三样说齐。'),
        S('给 AI 的话像一张愿望说明书：我要它做什么、做给谁、还有什么要求。三样越清楚，毛球越少乱猜。','用手指依次点：目标、给谁、要求。','现在每个人来拼一张自己的愿望说明书。'),
        S('每一行只选一块：先选目标，再选讲给谁，最后选形式要求。选完以后，把三块连起来大声读一遍，听听像不像一句清楚的话。','老师先示范一组，不替孩子选答案。','三块积木准备好，开始拼。'),
        S('先选“做什么”，再选“给谁”，最后选“怎么做”。三块都亮以后，不要立刻结束；请把完整句子读出来，再想想还想补什么。','每个孩子拼一条指令并口头读出；快的孩子补一个限制。','第一次结果如果不好，我们是不是只能放弃？'),
        S('第一次结果不满意很正常。我们可以告诉毛球哪里不对，再补一个要求重试。和 AI 合作更像来回修改，不是许愿一次就结束。','孩子先选，再把刚才指令补得更具体。','结果改好了，还差最后一个真正学会的动作。'),
        S('不要把 AI 的答案原样搬走。请关掉屏幕，用自己的话讲给同桌听；能讲明白，才说明知识真的进了你的脑袋。讲不清，就回去查一查、再问。','两人一组完成一次 20 秒 teach-back。','毛球把今天的学习循环说一遍，大家帮它检查。'),
        S('毛球说：说清楚、看结果、再追问，最后自己讲。English time：prompt，就是给 AI 的愿望说明书。跟我念两遍：prompt。','带读 prompt；让孩子用中文解释这个词。','最后，每个人说一句自己最想补的要求。'),
        S('回想刚才的愿望说明书：如果再给你一次机会，你会补哪一个要求，让结果更适合你？请说完整一句。','收两三个具体补充，不接受只说“更好看”。','到现在，毛球主要还是在回答。下一课，它要从“会说”进化成“会按计划做事”的小管家。')
      ],
      9:[
        S('今天毛球要进化了。以前你问一句，它答一句；现在我们看看一种会接到目标、列步骤、一步步做、最后检查的 AI 小管家。它很能干，但老板必须一直是人。','让孩子做“老板”手势，先说明页面只是计划模拟，不会真的发送。','先分清“给清单”和“把活做完”是不是一回事。'),
        S('如果毛球给你列了一张生日派对清单，它就算把派对准备完了吗？还是那只是一份计划，后面还有很多动作？','让孩子选择，并举一个“列了但没做”的生活例子。','对，计划很重要，但计划不是完成。'),
        S('一个小管家要走完整一圈：听懂目标、拆成计划、一步步行动、再检查结果。少了最后的检查，做得越快，错得也可能越快。','全班用四个手势做一遍：目标、计划、行动、检查。','接下来你们当老板，找出哪一步必须让毛球停下来问人。'),
        S('屏幕里是一份生日派对计划。准备清单可以先做；一旦涉及对外发送、花钱、公开发布或私人信息，毛球必须停下来，等人批准。','先让孩子预测哪一步有红灯，不急着点。','老板们开始审计划，找出人类闸门。'),
        S('从第一步慢慢往下看。点出那一步以后，要说清楚为什么不能让它自己决定。记住，这只是静态模拟，不会真的发邀请。','完成闸门判断；答对后让孩子说“发送前先问人”。','找到一个闸门还不够，哪些动作都属于同一类？'),
        S('付款、发布、发消息、改账号、使用私人信息，都必须问人。列草稿、整理清单可以先做，但真正对外行动前要停。','让孩子把一个新例子归到“可准备”或“要批准”。','毛球这么能干，最后出了问题谁负责？'),
        S('Agent 很能干，但它不是责任人。给目标、设边界、看结果、最后拍板的人，仍然是我们。能干的是它，负责的是人。','全班指向自己说“我是老板，我来检查”。','请毛球把老板守则讲清楚。'),
        S('毛球说：能干的是我，拍板和负责的是人。English time：agent 是会按计划做事的小管家，check 是检查。跟我念：agent，check。','带读两个词，再做一次四步手势。','离开前，请每位老板说出一个必须设置的闸门。'),
        S('想一个生活任务，指出哪一步必须停下来问大人。请用一句完整的话：“做____之前，毛球必须先问人。”','收三个不同例子，纠正模糊回答。','下一课是毕业项目。你们不只当老板，还要当导演，真正验收一个小作品。')
      ],
      10:[
        S('还记得第一课吗？那时毛球问“什么是 AI”，大家有很多猜测。今天你们已经会训练、会查错、会保护秘密、会给任务；最后一课，每个人都要当一次导演。','快速回顾孩子最喜欢的一课，宣布今天目标是完成一个很小但能验收的作品。','导演开工前，先回答“AI 说完成”到底算不算完成。'),
        S('如果 AI 对你说“已经做完了”，作品就真的完成了吗？还是导演还要打开、试玩、检查，亲自决定能不能展示？','让孩子选择，并说出自己会检查什么。','对，完成不是一句话，是我们能看到、能试、能检查的结果。'),
        S('作品完成要有证据，还要有人验收。AI 可以当剧组帮忙，但导演要看成品、找问题、要求修改，最后才说“可以了”。','全班说：AI 是剧组，我是导演。','今天不做大工程，只做一个能在课堂里完成的小作品。'),
        S('先选一个最小作品：一页故事、三题游戏或一个分类小发明。成功标准只有三条：今天做得完、真的改过一个问题、展示前由老师或大人批准。','让孩子先选项目，再口头说一句“给谁做、做什么”。','项目选定，进入毕业小样工作室。'),

    function renderType(s,l){

    function bindTrainer(){state.tool.a??=0;state.tool.b??=0;state.tool.trained??=false;state.tool.mislabel??=false;const draw=()=>{$('aSamples').textContent='☀️'.repeat(state.tool.a);$('bSamples').innerHTML='🌿'.repeat(state.tool.b)+(state.tool.mislabel?'<span aria-label="放错标签的太阳">☀️❌</span>':'');$('fixLabelBtn').hidden=!state.tool.mislabel;$('mislabelBtn').hidden=state.tool.mislabel};const invalidate=()=>{state.tool.trained=false};$('addA').onclick=()=>{state.tool.a=Math.min(6,state.tool.a+1);invalidate();draw()};$('addB').onclick=()=>{state.tool.b=Math.min(6,state.tool.b+1);invalidate();draw()};$('mislabelBtn').onclick=()=>{if(state.tool.a<1||state.tool.b<1)return $('feedback').textContent='先给两边各放一个例子。';state.tool.mislabel=true;invalidate();draw();$('feedback').textContent='糟糕！太阳被标成了森林。先别修，训练后用新题考试。'};$('fixLabelBtn').onclick=()=>{state.tool.mislabel=false;invalidate();draw();$('feedback').textContent='标签修正了。记得重新训练，旧结果不会自己变好。'};$('trainBtn').onclick=()=>{if(state.tool.a<2||state.tool.b<2)return $('feedback').textContent='两边都至少要 2 个例子。';state.tool.trained=true;$('feedback').textContent=state.tool.mislabel?'训练完成，但数据里藏着一个错标签。用新题试试看。':'重新训练完成！现在用没见过的新题考试。'};$('testBtn').onclick=()=>{$('feedback').textContent=!state.tool.trained?'还没训练，毛球只能乱猜。':state.tool.mislabel?'考试失败：太阳被教成了森林。修标签，再重新训练。':Math.abs(state.tool.a-state.tool.b)>2?'毛球有点犹豫：两类例子差太多，再补平衡一些。':'新题答对了！这次通过，但以后还要继续测试。'};draw()}
    function bindTimeline(){const years=['1950','1997','2016','2022'],stories={1950:'图灵先问：机器能表现得像在思考吗？',1997:'深蓝成为下棋这个单项的冠军。',2016:'AlphaGo 通过棋局和练习学会复杂围棋。',2022:'生成式 AI 开始会写、会画、会对话。'};let n=0;$('timeline').querySelectorAll('[data-year]').forEach(b=>b.onclick=()=>{if(b.dataset.year===years[n]){b.classList.add('correct');b.disabled=true;const story=stories[b.dataset.year];n++;$('feedback').textContent=n===4?`${story} 四站点亮：AI 是一代代人接力做出来的。`:`${story} 下一站找 ${years[n]}。`}else{$('feedback').textContent='这站还太晚，先找更早的一站。';b.classList.add('wrong')}})}
    function bindDetective(){const cases=[['彩虹斑马鲨住在云里。','check','名字很神奇，但这是能查的事实。'],['我觉得蓝色最漂亮。','opinion','“我觉得”是个人观点，没有唯一答案。'],['海豚是哺乳动物。','check','这是能查证的知识，不能只听 AI 自己说。']];let n=0;const show=()=>{$('caseCard').innerHTML=`<h3>${cases[n][0]}</h3><div class="chips"><button class="chip" data-v="check">需要查证</button><button class="chip" data-v="opinion">这是观点</button></div><div class="feedback" id="feedback">第 ${n+1} / 3 案</div>`;$('caseCard').querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{if(b.dataset.v===cases[n][1]){b.classList.add('on');$('feedback').textContent=cases[n][2]+(n===2?' 下一步去书、可靠网站或可信任大人那里找证据。':'');if(n<2)setTimeout(()=>{n++;show()},1050)}else $('feedback').textContent='再想：这是能查的事实，还是“我觉得”？'})};show()}
    function bindPrivacy(){const items=[['我喜欢恐龙','safe'],['我的住址是……','never'],['网上的人让我瞒着大人','adult'],['妈妈的银行卡照片','never']];let n=0;const show=()=>{$('privacyCard').innerHTML=`<h3>${items[n][0]}</h3><div class="chips"><button class="chip" data-v="safe">可以说</button><button class="chip" data-v="adult">先找大人</button><button class="chip" data-v="never">不分享</button></div><div class="feedback" id="feedback">第 ${n+1} / 4 条</div>`;$('privacyCard').querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{if(b.dataset.v===items[n][1]){b.classList.add('on');$('feedback').textContent='放对了！';if(n<3)setTimeout(()=>{n++;show()},800)}else $('feedback').textContent='想想身份、位置、金钱和危险。'})};show()}
    function bindPrompt(){const groups=$('toolBody').querySelectorAll('[data-group]');const selected=()=>[...groups].map(g=>g.querySelector('.chip.on')?.dataset.value);const buildAnswer=(goal,who,how,better)=>{const facts=goal==='恐龙'?(better?['霸王龙用两条腿走路','三角龙头上有角','腕龙的脖子很长']:['恐龙很大','恐龙生活在很久以前','后来许多恐龙灭绝了']):(better?['海豚用肺呼吸','海豚会用声音找方向','小海豚喝妈妈的奶']:['海豚住在海里','海豚会游得很快','海豚常常一起活动']);if(how==='最后考我')return `讲给${who}：${facts.slice(0,2).join('；')}。问题：${goal==='恐龙'?(better?'三角龙头上有什么？':'恐龙生活在什么时候？'):(better?'海豚用什么呼吸？':'海豚住在哪里？')}`;return `讲给${who}，正好三句话：${facts.map(x=>`${x}。`).join('')}`};const showResult=()=>{const [goal,who,how]=selected();if(!goal||!who||!how)return;$('promptResult').hidden=false;$('promptAnswer').textContent=buildAnswer(goal,who,how,false);$('improvePrompt').disabled=false;$('improvePrompt').textContent=how==='最后考我'?'补一句：问题要考具体特点':'补一句：每句话给一个具体特点';$('feedback').textContent='结果出来了，但还有点笼统。你想补什么要求？'};groups.forEach(g=>g.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{g.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');const picked=selected().filter(Boolean).length;if(picked===3)showResult();else $('feedback').textContent=`还差 ${3-picked} 块积木。`}));$('improvePrompt').onclick=()=>{const [goal,who,how]=selected();$('promptAnswer').textContent=buildAnswer(goal,who,how,true);$('improvePrompt').disabled=true;$('improvePrompt').textContent='✓ 要求补清楚了';$('feedback').textContent='第二次更具体了！现在请孩子不用照抄，用自己的话讲回来。'}}
    function bindProject(){const samples={story:{title:'毛球雨天记',bad:'毛球冒着大雨出门，却说今天阳光灿烂。',good:'毛球带上小伞，在雨里踩出三朵水花。'},quiz:{title:'动物小测验',bad:'鲸鱼是哪一类？答案：鱼。',good:'鲸鱼是哪一类？答案：哺乳动物。'},model:{title:'分类小发明',bad:'水果：苹果、香蕉、胡萝卜。',good:'水果：苹果、香蕉。蔬菜：胡萝卜。'}};const artifact=$('projectArtifact'),fixCheck=$('toolBody').querySelector('[data-check="fix"]');const renderArtifact=()=>{const item=samples[state.tool.project];artifact.hidden=false;artifact.innerHTML=`<b>${item.title}</b><p class="${state.tool.fixed?'artifact-good':'artifact-bad'}">${state.tool.fixed?item.good:item.bad}</p><button class="big-btn light" id="fixArtifact" type="button" ${state.tool.fixed?'disabled':''}>${state.tool.fixed?'✓ 已经改好':'我找到问题了，点我改好'}</button>`;$('fixArtifact').onclick=()=>{state.tool.fixed=true;fixCheck.classList.add('on');renderArtifact();updateProject()}};$('toolBody').querySelectorAll('[data-project]').forEach(b=>b.onclick=()=>{$('toolBody').querySelectorAll('[data-project]').forEach(x=>x.classList.remove('on'));b.classList.add('on');state.tool.project=b.dataset.project;state.tool.fixed=false;$('toolBody').querySelectorAll('[data-check]').forEach(x=>x.classList.remove('on'));renderArtifact();updateProject()});$('toolBody').querySelectorAll('[data-check]:not([data-check="fix"])').forEach(b=>b.onclick=()=>{b.classList.toggle('on');updateProject()})}
    function updateProject(){const project=$('toolBody').querySelector('.project.on'),checks=$('toolBody').querySelectorAll('[data-check].on').length;$('feedback').textContent=!project?'先选一个小作品。':!state.tool.fixed?'先看小样：哪一句或哪一类有问题？':checks===3?'证据齐了，请老师亲自打开、试玩，再决定能不能展示。':`问题已经改好，还差 ${3-checks} 项验收证据。`}
    function renderDoodle(){$('toolBody').innerHTML=`<div class="center"><canvas class="doodle" id="doodle" width="880" height="420"></canvas><div class="doodle-actions"><button class="big-btn light" id="clearDoodle">清空</button><button class="big-btn" id="guessDoodle">毛球来猜</button></div><div class="feedback" id="feedback">用手指或鼠标画一画。</div></div>`;const c=$('doodle'),ctx=c.getContext('2d');ctx.lineWidth=10;ctx.lineCap='round';ctx.strokeStyle='#2a6a9e';let down=false,strokes=0;const p=e=>{const r=c.getBoundingClientRect();return[(e.clientX-r.left)*c.width/r.width,(e.clientY-r.top)*c.height/r.height]};c.onpointerdown=e=>{down=true;strokes++;ctx.beginPath();ctx.moveTo(...p(e));c.setPointerCapture(e.pointerId)};c.onpointermove=e=>{if(down){ctx.lineTo(...p(e));ctx.stroke()}};c.onpointerup=()=>down=false;$('clearDoodle').onclick=()=>{ctx.clearRect(0,0,c.width,c.height);strokes=0};$('guessDoodle').onclick=()=>$('feedback').textContent=strokes<3?'毛球猜：太阳？再多画几笔。':strokes<7?'毛球猜：猫或鱼？':'毛球猜了一个答案——自信不等于正确！'}
    function renderDots(slides){$('dots').innerHTML=slides.map((_,i)=>`<button class="dot ${i<state.slide?'done':''} ${i===state.slide?'active':''}" data-go="${i}" aria-label="第 ${i+1} 页"></button>`).join('');$('dots').querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{state.slide=+b.dataset.go;render()})}
    $('prevBtn').onclick=()=>{if(state.slide>0){state.slide--;render()}};$('nextBtn').onclick=()=>{const l=lessons[state.lesson],slides=makeSlides(l);if(state.slide<slides.length-1){state.slide++;render();return}state.done.add(l.id);save();if(l.id<10)openLesson(l.id+1);else home()};$('homeBtn').onclick=home;$('rehearsalBtn').onclick=()=>{state.rehearsal=!state.rehearsal;save();renderMap()};$('teacherBtn').onclick=()=>{$('teacherPanel').hidden=!$('teacherPanel').hidden};$('closeTeacher').onclick=()=>$('teacherPanel').hidden=true;$('fullBtn').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();addEventListener('keydown',e=>{if($('deck').hidden)return;if(e.key==='ArrowRight')$('nextBtn').click();if(e.key==='ArrowLeft')$('prevBtn').click();if(e.key.toLowerCase()==='s')$('teacherBtn').click();if(e.key==='Escape')$('teacherPanel').hidden=true});
    let x=0;$('stage').addEventListener('touchstart',e=>x=e.changedTouches[0].clientX,{passive:true});$('stage').addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-x;if(Math.abs(d)>70)(d<0?$('nextBtn'):$('prevBtn')).click()},{passive:true});
    renderMap();const m=location.hash.match(/^#lesson-(\d{2})-slide-(\d+)$/);if(m){openLesson(+m[1]);state.slide=Math.max(0,Math.min(8,+m[2]-1));render()}
  })();
  </script>
