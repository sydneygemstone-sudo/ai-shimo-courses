      if(s.tool==='project'){$('toolBody').querySelectorAll('[data-project]').forEach(b=>b.onclick=()=>{$('toolBody').querySelectorAll('[data-project]').forEach(x=>x.classList.remove('on'));b.classList.add('on');updateProject()});$('toolBody').querySelectorAll('[data-check]').forEach(b=>b.onclick=()=>{b.classList.toggle('on');updateProject()})}
    }
    function bindTrainer(){state.tool.a=state.tool.a||0;state.tool.b=state.tool.b||0;state.tool.trained=false;const draw=()=>{$('aSamples').textContent='☀️'.repeat(state.tool.a);$('bSamples').textContent='🌿'.repeat(state.tool.b)};$('addA').onclick=()=>{state.tool.a=Math.min(6,state.tool.a+1);draw()};$('addB').onclick=()=>{state.tool.b=Math.min(6,state.tool.b+1);draw()};$('trainBtn').onclick=()=>{if(state.tool.a<2||state.tool.b<2)return $('feedback').textContent='两边都至少要 2 个例子。';state.tool.trained=true;$('feedback').textContent='训练完成！现在用新题考试。'};$('testBtn').onclick=()=>{$('feedback').textContent=state.tool.trained?'新题结果出来了：答对一次还要继续测。':'还没训练，毛球只能乱猜。'};draw()}
    function bindTimeline(){const years=['1950','1997','2016','2022'];let n=0;$('timeline').querySelectorAll('[data-year]').forEach(b=>b.onclick=()=>{if(b.dataset.year===years[n]){b.classList.add('correct');b.disabled=true;n++;$('feedback').textContent=n===4?'四站点亮！AI 是一步步长大的。':`正确，下一站在 ${years[n]}。`}else{$('feedback').textContent='这站还太晚，找更早的一站。';b.classList.add('wrong')}})}
    function bindDetective(){const cases=[['彩虹斑马鲨住在云里。','check'],['我觉得蓝色最漂亮。','opinion'],['海豚是哺乳动物。','check']];let n=0;const show=()=>{$('caseCard').innerHTML=`<h3>${cases[n][0]}</h3><div class="chips"><button class="chip" data-v="check">需要查证</button><button class="chip" data-v="opinion">这是观点</button></div><div class="feedback" id="feedback">第 ${n+1} / 3 案</div>`;$('caseCard').querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{if(b.dataset.v===cases[n][1]){b.classList.add('on');$('feedback').textContent='判断正确！';if(n<2)setTimeout(()=>{n++;show()},650)}else $('feedback').textContent='再想：这是能查的事实，还是“我觉得”？'})};show()}
    function bindPrivacy(){const items=[['我喜欢恐龙','safe'],['我的住址是……','never'],['有人让我保密','adult'],['妈妈的银行卡照片','never']];let n=0;const show=()=>{$('privacyCard').innerHTML=`<h3>${items[n][0]}</h3><div class="chips"><button class="chip" data-v="safe">可以说</button><button class="chip" data-v="adult">先找大人</button><button class="chip" data-v="never">不分享</button></div><div class="feedback" id="feedback">第 ${n+1} / 4 条</div>`;$('privacyCard').querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{if(b.dataset.v===items[n][1]){b.classList.add('on');$('feedback').textContent='放对了！';if(n<3)setTimeout(()=>{n++;show()},650)}else $('feedback').textContent='想想身份、位置、金钱和危险。'})};show()}
    function updateProject(){const project=$('toolBody').querySelector('.project.on'),checks=$('toolBody').querySelectorAll('[data-check].on').length;$('feedback').textContent=!project?'先选一个小作品。':checks===3?'三道发布门通过，可以请老师验收！':`作品选好了，还差 ${3-checks} 道发布门。`}
    function renderDoodle(){$('toolBody').innerHTML=`<div class="center"><canvas class="doodle" id="doodle" width="880" height="420"></canvas><div class="doodle-actions"><button class="big-btn light" id="clearDoodle">清空</button><button class="big-btn" id="guessDoodle">毛球来猜</button></div><div class="feedback" id="feedback">用手指或鼠标画一画。</div></div>`;const c=$('doodle'),ctx=c.getContext('2d');ctx.lineWidth=10;ctx.lineCap='round';ctx.strokeStyle='#2a6a9e';let down=false,strokes=0;const p=e=>{const r=c.getBoundingClientRect();return[(e.clientX-r.left)*c.width/r.width,(e.clientY-r.top)*c.height/r.height]};c.onpointerdown=e=>{down=true;strokes++;ctx.beginPath();ctx.moveTo(...p(e));c.setPointerCapture(e.pointerId)};c.onpointermove=e=>{if(down){ctx.lineTo(...p(e));ctx.stroke()}};c.onpointerup=()=>down=false;$('clearDoodle').onclick=()=>{ctx.clearRect(0,0,c.width,c.height);strokes=0};$('guessDoodle').onclick=()=>$('feedback').textContent=strokes<3?'毛球猜：太阳？再多画几笔。':strokes<7?'毛球猜：猫或鱼？':'毛球猜了一个答案——自信不等于正确！'}
    function renderDots(slides){$('dots').innerHTML=slides.map((_,i)=>`<button class="dot ${i<state.slide?'done':''} ${i===state.slide?'active':''}" data-go="${i}" aria-label="第 ${i+1} 页"></button>`).join('');$('dots').querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{state.slide=+b.dataset.go;render()})}
    $('prevBtn').onclick=()=>{if(state.slide>0){state.slide--;render()}};$('nextBtn').onclick=()=>{const l=lessons[state.lesson],slides=makeSlides(l);if(state.slide<slides.length-1){state.slide++;render();return}state.done.add(l.id);save();if(l.id<10)openLesson(l.id+1);else home()};$('homeBtn').onclick=home;$('teacherBtn').onclick=()=>{$('teacherPanel').hidden=!$('teacherPanel').hidden};$('closeTeacher').onclick=()=>$('teacherPanel').hidden=true;$('fullBtn').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();addEventListener('keydown',e=>{if($('deck').hidden)return;if(e.key==='ArrowRight')$('nextBtn').click();if(e.key==='ArrowLeft')$('prevBtn').click();if(e.key.toLowerCase()==='s')$('teacherBtn').click();if(e.key==='Escape')$('teacherPanel').hidden=true});
    let x=0;$('stage').addEventListener('touchstart',e=>x=e.changedTouches[0].clientX,{passive:true});$('stage').addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-x;if(Math.abs(d)>70)(d<0?$('nextBtn'):$('prevBtn')).click()},{passive:true});
    renderMap();const m=location.hash.match(/^#lesson-(\d{2})-slide-(\d+)$/);if(m){openLesson(+m[1]);state.slide=Math.max(0,Math.min(8,+m[2]-1));render()}
  })();
  </script>
</body>
