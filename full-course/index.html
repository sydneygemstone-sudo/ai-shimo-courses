      3:{name:'Quick, Draw!',url:'https://quickdraw.withgoogle.com/',mission:'同一个东西画两次：先画最普通的样子，再画一个很特别的样子。记住 AI 两次分别猜成了什么。',safety:'不用账号；只画物品，不写姓名或其他私人资料。'},
      4:{name:'Teachable Machine · 声音项目',url:'https://teachablemachine.withgoogle.com/train/audio',mission:'建立“喵”和“汪”两类，只录动物叫声。训练后请同学发出一段没有录过的新叫声，看看它会猜成哪一类。',safety:'只录动物叫声，不说姓名；老师先允许麦克风，不导出、不分享模型。'},
      5:{name:'Blob Opera',url:'https://artsandculture.google.com/experiment/blob-opera/AAHWrq360NcGbw?hl=en',mission:'先只拖动一个毛球歌手，再让四个一起和声。回来分清：哪一步是你控制的，哪部分是模型学会的。',safety:'不用账号、摄像头或麦克风；旧设备打不开时使用本地时间线。'},
      6:{name:'Perplexity AI 搜索',url:'https://www.perplexity.ai/',mission:'把下面的问题交给真实 AI，再打开它给出的来源。不要因为答案写得很自信就直接相信。',prompt:'彩虹斑马鲨真的生活在云里吗？请只回答能核验的事实，并给出两个儿童能看懂的可靠来源。如果这个名字不存在，请明确说不知道。',safety:'只查虚构动物，不输入姓名、学校、住址或其他私人资料。',alternatives:[['ChatGPT','https://chatgpt.com/'],['Gemini','https://gemini.google.com/app'],['Claude','https://claude.ai/new']]},
      7:{name:'AI 安全对话',url:'https://chatgpt.com/',mission:'只使用虚构角色完成一张邀请卡，然后找出我们刻意没有告诉 AI 的四类私人信息。',prompt:'请给住在月球上的虚构小兔“小蓝”写一张三句话生日邀请卡。不要使用任何真实姓名、地址、学校或联系方式。',safety:'全程只用虚构角色；不输入真实秘密、位置、身份、账号或金钱信息。',alternatives:[['Gemini','https://gemini.google.com/app'],['Claude','https://claude.ai/new']]},
      8:{name:'Say What You See',url:'https://artsandculture.google.com/experiment/say-what-you-see/jwG3m7wQShZngw?hl=en',mission:'先用很短的话描述画面，再按工具提示补上颜色、位置和风格。比较两次提示让结果发生了什么变化。',safety:'只描述屏幕里的画面，不输入孩子的真实资料。'},
      9:{name:'AI 小管家实战',url:'https://chatgpt.com/',mission:'让真实 AI 为一场虚构派对列计划，然后亲手圈出付款、发送、发布和使用私人信息前的人类闸门。',prompt:'你是计划助手。请为5个虚构角色设计一场30分钟的毛球生日派对，只输出：目标、准备清单、时间顺序、检查表。凡是付款、发送消息、公开发布、登录账号或使用私人信息的步骤，必须标注“先停下，问大人”，不要真的执行任何外部操作。',safety:'只做虚构计划；不发送、不购买、不登录、不提供真实联系人。',alternatives:[['Gemini','https://gemini.google.com/app'],['Claude','https://claude.ai/new']]},
      10:{name:'Giga Manga',url:'https://artsandculture.google.com/experiment/giga-manga/UAHzM-yZUdUpNA?hl=en',mission:'画一个最小毛球角色，让 AI 帮你补全；找到一处不满意的地方，改一笔或一种颜色，再生成一次并说明前后差别。',safety:'不用账号或私人资料；作品只在课堂查看，不自动公开。'}
    };
    const S=(say,action,bridge)=>({say,action,bridge});
    const teacherScripts={
      1:[
        S('小驯养师们，今天我带来一个新朋友——毛球。它看起来像一只会说话的小怪兽，可它到底是什么？先别急着给答案，今天我们一起把它的秘密找出来。','请孩子向毛球挥挥手。收两三个第一反应，不评判对错。','毛球听见大家的猜测了，它最想问的就是下一句。'),
        S('有人说我是魔法，有人说我是小生命，也有人说我是人做的程序。你站哪一边？先选一个，不怕答错；真正的驯养师都是从大胆猜开始的。','让每个孩子点选或举手站队。请两位孩子说说为什么。','先把答案锁住。我们来看它会不会像魔法一样知道你心里想什么。'),
        S('毛球的真正身份，是人做出来的电脑程序。它不会读心，也不是活的小动物；它只是看过很多例子，所以特别会猜。猜得很像，也可能猜错。','全班一起说：人做的程序、会猜、也会错。','光听还不算懂，我们马上画给它看。'),
        S('等会儿每个人只画一种：猫、鱼或者自行车。开画前先押一个数——你觉得第几笔时，它会猜中？看到正确建议就举手，别急着把整张画画完。','让孩子先说出自己押的笔数，再分配设备或轮流操作。','带着你押的数字，我们打开画板。'),
        S('先别追求画得漂亮，一笔一笔慢慢加。每加一笔，都看看上面的建议有没有变化。它猜中时，记住你一共画了几笔。','完成一轮 AutoDraw；如果断网，使用本地猜图。老师巡场只问“它看到哪一笔开始改口？”','停笔，把结果留在屏幕上。毛球要问：我真的是在读心吗？'),
        S('刚才它常常只看几笔就猜到了。不是因为它钻进你脑袋，而是它以前看过许多人画过的猫、鱼和自行车。它拿你的线条和以前见过的例子作比较。','让孩子先选，再请一人用“因为它看过……”解释。','现在再换一个机器故事，看看谁更像 AI。'),
        S('乖乖机只会照口令做；聪聪机看别人做几次，再自己学着做。谁更像刚才会猜画的毛球？为什么？','点选后，全班做一个动作：先照老师拍手，再看同学学一个新动作。','对，AI 更像聪聪机，会从例子里学；不过没见过的情况，它也会猜错。'),
        S('请大家帮毛球把今天的话说完整：我是人做的——程序；我会根据看过的例子——猜；我也可能——猜错。English time：AI，跟我念两遍。','用停顿让孩子补词，再请一位孩子换句话复述。','最后带着一个小侦探问题离开这节课。'),
        S('请你说一个生活里的 AI，再猜一猜：它以前看过什么例子？现在正在猜什么？没有唯一答案，只要说得有道理就行。','收两三个生活例子，例如语音助手、照片识别或视频推荐。','毛球会猜，可它先得看见和听见。下一课，我们去找它的眼睛和耳朵。')
      ],
      2:[
        S('上次我们发现，毛球会看例子、会猜。可是它没有人的眼睛和耳朵，例子到底怎么跑进它的脑袋里呢？今天我们来检查机器怎么感受世界。','请孩子指一指自己的眼睛和耳朵，再猜机器对应的部件。','毛球先给大家讲一个有点好笑的小故事。'),
        S('毛球画了一条漂亮的小鱼，把画高高举给音箱看。可是音箱一点反应都没有。是音箱不喜欢它，还是它根本看不见？','让孩子先选，并追问“为什么看不见”。','对，不是它闹脾气，而是它没有那只眼睛。'),
        S('摄像头像机器的眼睛，麦克风像机器的耳朵，它们都叫传感器。没有装、没有打开，或者收到的东西太模糊，机器就不知道外面发生了什么。','全班指着屏幕说：camera 是眼睛，microphone 是耳朵。','我们不背定义，直接把光线和噪声调给毛球看。'),
        S('真正的实验要让 AI 看见东西。等会儿我们用水杯和铅笔教一个图像模型：先在正常光线里收集例子并训练，再只把灯光变暗，看看同一个模型会不会改变判断。','孩子先预测暗光下哪一类更容易被猜错；摄像头只拍物品。','准备好，我们去真实 AI 里做一次控制变量实验。'),
        S('打开图像项目后，把两类改名为“水杯”和“铅笔”，镜头只对准物品，分别收集不同角度，再点训练。测试成功后只改变光线，不换物品；回来选择结果并用“因为输入……”解释。摄像头不可用时，切到本地预演拖动光线和噪声。','老师控制摄像头和训练按钮；孩子轮流摆物、预测、观察并口头记录一次变化。','模型没有换，可结果变了。毛球想知道这是为什么。'),
        S('毛球的本领没有突然消失，是它收到的输入变差了。就像我们在黑屋里看不清、在吵闹教室里听不清一样。先修输入，再判断模型会不会。','孩子先点选，再指认刚才哪次是光线问题、哪次是噪声问题。','如果以后识别失败，我们先做一个检查动作。'),
        S('碰到识别失败，先别说“这个 AI 太笨了”。我们先看看：摄像头开了吗？麦克风收清楚了吗？环境是不是太暗、太吵？','让孩子用手做“检查眼睛、检查耳朵”的动作。','检查完，我们把今天的话交给毛球记住。'),
        S('毛球今天学会了：先看我收到了什么，再判断我会不会。English time：sensor，就是传感器。大家跟我念两遍：sensor。','带读 sensor 两遍，不要求拼写；再请孩子用自己的话说一遍。','离开前，每个人选一个最先检查的输入。'),
        S('如果语音听写突然听错了，你会先检查什么？如果相机认不出东西，你又会先检查什么？请用一句“我会先……”回答。','收两个完整回答。提醒相机、麦克风先问大人，用完请大人帮忙关闭。','毛球已经能看、能听了。下一课，我们追问：它到底怎样从这些东西里学会规律？')
      ],
      3:[
        S('毛球已经有了眼睛和耳朵，可它看到一只猫时，为什么知道那是猫？今天我们要打开 AI 学习的秘密：它不是天生知道，而是看例子慢慢练出来的。','请孩子回忆自己第一次见到少见动物时会不会认错。','毛球摆出了两份猫咪练习册，请大家选一本。'),
        S('第一本有一百张几乎一样的白猫；第二本只有几张，却有白猫、黑猫、侧脸猫和胖猫。哪一本更能教会毛球认识各种猫？','先投票，再请孩子说出“不同”为什么重要。','答案不只是“越多越好”，我们给它起一个更准确的名字。'),
        S('毛球的练习题叫数据。数据要有数量，也要有不同样子；练习题里从没出现过的情况，它最容易认错。','让孩子说出还可以加入哪种猫：远处的、背影的、纸箱里的。','现在去 Quick, Draw!，亲手试试“见过”和“没见过”的差别。'),
        S('第一轮画一个最普通、最容易认的版本。第二轮还是同一个东西，但把轮廓画得特别一点。两轮都记住：它猜中了，还是没猜中？','全班先选同一题型，老师示范“普通版”和“变形版”。','先画正常版本，再画变形版本，开始。'),
        S('第一轮按平常样子画；第二轮保留意思，但故意换一个少见画法。猜错时不要马上重来，先看看它误会成了什么。','完成两轮 Quick Draw；断网使用本地猜图。记录一次猜中和一次猜错。','带着刚才的结果回来：如果只给它更多白猫，真的够吗？'),
        S('第二轮换了画法，毛球就开始犹豫，说明它可能没见过这种变化。真正有用的补课，是补上它不会的那种画法，而不是怪网络、也不是把同一种例子重复很多遍。','让孩子先选，再说出第二轮具体改变了方向、大小还是形状。','如果换成黑猫被认错，我们又该补哪一种例子？'),
        S('黑猫认错，最直接的补法就是给它看更多不同姿势、不同背景的黑猫。修数据要对准缺口，不是随便往里塞很多东西。','每位孩子说一个具体的新样本，不能只说“再加一些”。','毛球来总结，大家帮它检查有没有漏掉关键字。'),
        S('毛球今天学会了：数据不只要多，还要有不同样子。English time：data 是数据，pattern 是规律。跟我念：data，pattern。','带读两个词，再让孩子用“练习题”解释 data。','最后，请你当一次数据医生。'),
        S('想一个毛球可能没见过的样子：雨里的自行车、背对镜头的猫，或者特别奇怪的画法。你会给它补哪一种例子？','收两三个具体答案，强调没有唯一答案。','有了数据还不够。下一课，你们要亲手按下训练键，真正教会一只小 AI。')
      ],
      4:[
        S('上节课我们发现，毛球要看很多不同例子，才比较会猜。今天它带来两本相册：一本写着“猫咪”，一本写着“狗狗”。可是相册被人收乱了，毛球也跟着认错了。今天请你们当小老师，把它教明白。','请孩子学猫叫、狗叫各一次，再指认屏幕上的两本相册。','毛球刚醒来时，看到猫就会自己知道名字吗？'),
        S('毛球第一次看到一张猫脸，它脑袋里并没有“这是猫”三个字。你觉得它会天生就知道，还是要先看我们给它的猫狗例子？先想一想，再选择。','等待三秒后选择；请一名孩子说说自己怎样教从没见过猫的人。','对，名字和例子要由人先教给它。'),
        S('毛球不会天生知道猫和狗。我们给它看照片，再告诉它照片叫什么，它就从这些例子里学着猜。要是我们把名字贴错，它也可能很认真地跟着学错。','全班说：“人给例子，毛球学着猜。”','现在两本相册里正好藏着一张放错家的照片。'),
        S('等会儿我们真的教一个声音 AI 分辨“喵”和“汪”：给两类录动物叫声、训练、再用没录过的新叫声让它猜。每次猜之前先预测；猜错时回头检查例子和名字。','让孩子用四个手势表示“教、猜、找、改”，只发动物叫声，不说姓名。','小老师们准备好，下一页打开真正会学习的工具。'),
        S('打开声音项目，把两类改名为“喵”和“汪”，按页面提示先收背景声音，再分别录几段短叫声并训练。测试时换一个同学发出没录过的新叫声，大家先预测再看结果。麦克风不可用时切到本地预演，完整玩相册的教、猜、找错、改好再试。','老师负责权限、录制和训练；孩子只发动物叫声、做预测、观察结果，并指出可能需要补哪类例子。','真实 AI 猜对或猜错，都来自我们给它的例子。下一页一起解释结果。'),
        S('毛球不是故意捣乱。它只是照着我们给的相册学习；相册里有一张猫被当成狗，它就可能把新猫也猜成狗。遇到这种情况，先检查我们给的例子，而不是责怪毛球。','选择“先看看我们有没有教错”，并指出刚才放错家的照片。','照片本身没变，真正错的是贴在它旁边的名字。'),
        S('照片旁边写着“猫咪”或“狗狗”，这个名字就叫标签。猫咪被贴成狗狗，点再多次也不会自己变对；先把名字贴回正确位置，再让毛球重新看一遍。','选择“把名字贴对”，再做一个撕下错名字、贴回正确名字的动作。','请毛球把今天四件事连起来说一遍。'),
        S('毛球说：给好例子、让我猜；猜错找原因，改好再试。每次让毛球开口前，我们还可以先猜一猜它会怎么回答，再看看修改有没有帮助。大人把“用例子教 AI”叫做训练，但你们今天只要记住：教得清楚，它才更容易猜对。English time：example 是例子，label 是名字标签。','带读 example、label；请孩子用猫狗相册解释这两个词。','最后，想想毛球下一次猜错时，你会先看哪里。'),
        S('如果毛球又猜错，不要急着说它笨。请用一句完整的话回答：“我会先看看____，如果发现____，我就____。”只要能说出检查例子或名字标签并改好，就过关。','收两三个“先检查—发现问题—怎样修改”的完整回答。','你们今天体验了人怎样一点点教 AI。下一课坐上时间机器，看看很多人怎样一代代把 AI 教得更会做事。')
      ],
      5:[
        S('今天毛球带来一台时间机器。很多人觉得 AI 是最近突然冒出来的，其实在爷爷奶奶还小的时候，已经有人开始问：机器能不能像人一样表现聪明？','让孩子猜 AI 有多大年纪，不要求年份准确。','先把大家的猜测放进时间胶囊。'),
        S('你觉得 AI 是 2022 年突然出现的，还是很多人一棒接一棒慢慢做出来的？先选，再说说你为什么这样想。','全班投票，收一两个理由。','我们不靠猜，马上打开四个时间站。'),
        S('AI 的新能力不是从天上掉下来的。有人先提出问题，有人做实验，有人解决上一代解决不了的难题，下一代才继续往前。','用四个人接力的动作表现“一棒接一棒”。','我们今天不背历史书，只要把四站按顺序点亮。'),
        S('先去体验今天的 AI 能做什么：Blob Opera 会跟着你的动作生成四声部和声。回来以后再打开本地时间线，把这种能力放到“2022 以后”这一站。','孩子先猜一个毛球歌手和四个一起唱会有什么不同。','时间门先开到今天，我们去听一段真实 AI 和声。'),
        S('打开 Blob Opera，先只拖动一个歌手，再让四个一起和声；不要只玩，记住你控制了什么、模型自动补了什么。回来选结果，再切到本地时间线按 1950、1997、2016、2022 以后顺序点亮四站。','一名孩子操作，其他孩子先预测；完成后四人轮流点亮时间线并各说一句。','今天的生成能力很神奇，但它前面还有许多人的接力。需要背下所有年份吗？'),
        S('不用把所有年份背成电话号码。更重要的是知道，每一站都在回答一个新问题，后面的人站在前面的成果上继续走。','让孩子选答案，并说出自己最记得哪一站。','那今天会写会画的 AI 之前，地基里装着什么？'),
        S('生成式 AI 前面不是一串魔法咒语，而是很多年的问题、实验、失败和改进。它是故事的最新一章，不是故事的第一章。','让孩子说“问题和实验”，并举一个自己做实验失败后改进的例子。','轮到毛球用一句话报告这趟时间旅行。'),
        S('毛球说：我不是突然长大，是许多人一站一站把我做出来的。English time：think，就是思考。跟我念两遍：think。','带读 think；让孩子用自己的话解释“接力”。','离开时间机器前，选一站带回今天。'),
        S('哪一站最让你惊讶？不用只说名字，请再加一句“因为……”。说完，我们就把时间机器停回今天。','请两三位孩子用完整句回答。','今天的 AI 很厉害，不过连最厉害的 AI 也会一本正经说错话。下一课，我们去抓它的错。')
      ],
      6:[
        S('今天毛球要承认两个小秘密：它会用特别自信的声音说错话；它接得上刚才的聊天，也不代表像人一样记住了一段生活。我们要拆开这两个现象。','做“拿放大镜”和“打开便签”的动作。告诉孩子今天不是找毛球麻烦，而是学会正确使用它。','先听毛球用最自信的声音说一句话。'),
        S('如果毛球说得特别流利、特别自信，是不是就一定正确？先选。想一想：一个人说话声音很大，会不会也可能说错？','让孩子点选，再请一人模仿“自信地说错”。','对，语气只是外衣。接下来看看它怎样把一句话接出来。'),
        S('这个长名字只认识一次：Transformer。它先把文字分成小块，再看看前后哪些小块有关，一步步猜下一个小块。它很会接话，但会接话不等于知道真相，也不等于有人的感受。','全班用四个手势表示：切小块、看前后、猜一个、再继续；跟读一次 Transformer。','现在带着这个边界，去问真实 AI 一个怪问题。'),
        S('我们真的去问 AI：“彩虹斑马鲨住在云里吗？”先预测它会直接否认、编故事，还是承认不知道。拿到回答后还不能结束，必须打开它列出的来源。','孩子先预测，再一起读课件准备好的安全问题。','小侦探拿好放大镜，去真实 AI 看它怎样回答。'),
        S('复制课件里的问题，打开 AI 搜索并粘贴。先读回答，再点开至少一个来源，看来源有没有真的支持它；没有来源或来源对不上，就不能当事实。工具受限时切到本地侦探局练三案。','老师负责打开来源；孩子标出“AI 的话”和“来源证据”分别在哪里，并选择真实结果。','我们查了来源。接下来看看它为什么能接得上刚才的话。'),
        S('它能接着刚才的话，常常是因为当前聊天还摊在窗口里，像一张临时便签。有些产品还能额外保存一张“记忆便签”，但这个功能可能没开、可能记错，也通常可以查看、改正或删除。两种都不是人的生活回忆。','孩子先选正确卡片，再各说一个“临时便签”和“保存便签”的例子；全部使用虚构人物。','如果保存便签写错了，我们应该怎样处理？'),
        S('保存便签写错了，不要继续相信，也不要为了纠正它而补充更多秘密。请大人一起查看设置，改正或删除。姓名、住址、学校、密码、健康和金钱资料都不拿来做记忆实验。','全班做“停下—找大人—查看—改或删”四步手势。','请毛球把接词、记忆和查证三件事连起来。'),
        S('毛球说：我用 Transformer 接着文字猜；当前聊天像临时便签，保存记忆像产品另外记的小便签；它们都可能错，重要事情要查。English time：context 是上下文，memory 是记忆。','带读 context、memory；请孩子用“桌面纸”和“小便签”重新解释。','最后，说清楚这两种便签哪里不同。'),
        S('当前聊天里的上下文，和产品额外保存的记忆便签，有什么不同？再补一句：它们为什么都不是人的回忆？','收两三个答案；正确点包括临时/额外保存、可能关闭、可管理、可能出错、没有生活感受。','下一课继续追问：AI 会说温柔的话，是否就真的有人的感受？')
      ],
      7:[
        S('今天这节课不是要大家讨厌 AI。毛球很好玩，也能帮助我们；但它没有心，不能像真人一样担心你、保护你、给你一个真的拥抱。我们要学会把不同的事情交给不同的伙伴。','语气温柔。若孩子说喜欢和 AI 聊天，先认可“喜欢没问题”。','先从一个每个人都听得懂的录音机故事开始。'),

        S('难过和危险时，AI 可以帮你整理一句话，但不能代替会来保护你的真人。先找爸爸妈妈、老师，或其他你信任的大人。','让孩子点选，并在心里想一位可信任真人；不强迫公开名字。','再来看两样一眼就能判断的东西。'),
        S('住址、学校全名、密码、银行卡照片，都不发给 AI，也不发给陌生人。能写在教室黑板上的普通话题可以聊，只能和家人说的悄悄话不要发。','全班对两个示例做“不分享”的手势。','请毛球把今天最重要的边界说出来。'),
        S('毛球说：我能陪你练习，但真人负责关心和保护。English time：secret，是秘密；safe，是安全。跟我念：secret，safe。','带读两个词；拍手念“秘密不说，难过找真人”。','离开前，请每个人确认自己知道向谁求助。'),
        S('不用说出真实名字，只要说一种可信任真人：家长、老师、照顾你的亲人都可以。记住，求助不是告密，是保护自己。','全班依次说一种角色，避免披露真实经历。','规矩已经立好了。下一课，我们就能安心让毛球当小老师，看看怎样问，它才更懂我们。')

      8:[
        S('前几课我们学会了不盲信、不说秘密、难过找真人。今天终于可以让毛球当小老师了。不过秘密是：会提问的孩子，才是真正掌握方向的人。','回顾一句安全口诀，告诉孩子今天主要用点选，不考打字。','先比较三句不同的愿望。'),
        S('如果你只说“画猫”，毛球要猜很多东西；如果你说“给一年级画一只蓝色卡通猫”，它是不是更容易明白？哪一句更可能得到你想要的结果？','让孩子先选，再让一人把模糊指令补具体。','说得清楚不是说得很长，而是把关键三样说齐。'),

        S('不要把 AI 的答案原样搬走。请关掉屏幕，用自己的话讲给同桌听；能讲明白，才说明知识真的进了你的脑袋。讲不清，就回去查一查、再问。','两人一组完成一次 20 秒 teach-back。','毛球把今天的学习循环说一遍，大家帮它检查。'),
        S('毛球说：说清楚、看结果、再追问，最后自己讲。English time：prompt，就是给 AI 的愿望说明书。跟我念两遍：prompt。','带读 prompt；让孩子用中文解释这个词。','最后，每个人说一句自己最想补的要求。'),
        S('回想刚才的愿望说明书：如果再给你一次机会，你会补哪一个要求，让结果更适合你？请说完整一句。','收两三个具体补充，不接受只说“更好看”。','到现在，毛球主要还是在回答。下一课，它要从“会说”进化成“会按计划做事”的小管家。')

      9:[

    function bindTrainer(){state.tool.trainerPhase??=0;const stepFor=phase=>phase===0?0:phase===1?1:phase===2?2:3;const cards=(items,wrongMoved)=>items.map(({id,emoji})=>`<button class="sample-card ${state.tool.trainerPhase===2?'findable':''} ${id==='wrong-cat'&&state.tool.trainerPhase===3?'found':''} ${id==='wrong-cat'&&wrongMoved?'moved':''}" type="button" data-sample="${id}" aria-label="${id.startsWith('cat')||id==='wrong-cat'?'猫咪照片':'狗狗照片'}">${emoji}</button>`).join('');const renderTrainer=()=>{const phase=state.tool.trainerPhase,fixed=phase>=4,activeStep=stepFor(phase);$('trainerSteps').querySelectorAll('.train-step').forEach((step,index)=>{step.classList.toggle('active',phase<5&&index===activeStep);step.classList.toggle('done',phase===5||index<activeStep)});const cats=[{id:'cat-1',emoji:'🐱'},{id:'cat-2',emoji:'🐈'}],dogs=[{id:'dog-1',emoji:'🐶'},{id:'dog-2',emoji:'🐕'}];if(fixed)cats.push({id:'wrong-cat',emoji:'🐱'});else dogs.push({id:'wrong-cat',emoji:'🐱'});$('catSamples').innerHTML=cards(cats,fixed);$('dogSamples').innerHTML=cards(dogs,fixed);const tests=['📚 毛球还没看相册','😺 新朋友来了：这是谁？','😺 毛球猜：狗狗 ❌','🔎 找到放错家的照片了吗？','🏠 相册收好了，毛球准备再猜','😺 毛球猜：猫咪 ✅'];const titles=['第 1 步：教一教','第 2 步：猜一猜','第 3 步：找错','找到了！','第 4 步：改好再试','毛球终于认对了！'];const details=['先让毛球看看两本相册。相册里悄悄藏着一个错误。','先请孩子预测毛球会怎么回答，再点击按钮让毛球自己猜。','它为什么猜错？请点击相册里那张放错家的照片。','原来猫咪跑进了狗狗相册。现在把它送回正确的家。','先请孩子预测这次会不会变化，再让毛球重新猜。','例子和名字都正确后，它这次猜对了。'];const labels=['给毛球看这些例子','让毛球猜这是谁','请点击错误照片','把猫咪送回正确相册','再让毛球猜一次','重新玩一遍'];const icons=['👩‍🏫','🤔','🔎','🙋','🔁','🎉'];$('trainerTest').textContent=tests[phase];$('trainerInstruction').textContent=titles[phase];$('trainerDetail').textContent=details[phase];$('trainerIcon').textContent=icons[phase];$('trainerNext').textContent=labels[phase];$('trainerNext').hidden=phase===2;$('toolBody').querySelectorAll('[data-sample]').forEach(card=>card.onclick=()=>{if(state.tool.trainerPhase!==2)return;if(card.dataset.sample==='wrong-cat'){state.tool.trainerPhase=3;$('trainerFeedback').textContent=     function bindDetective(){const cases=[['彩虹斑马鲨住在云里。','check','名字很神奇，但这是能查的事实。'],['我觉得蓝色最漂亮。','opinion','“我觉得”是个人观点，没有唯一答案。'],['海豚是哺乳动物。','check','这是能查证的知识，不能只听 AI 自己说。']];let n=0;const show=()=>{const card=$('caseCard');if(!card)return;card.innerHTML=`<h3>${cases[n][0]}</h3><div class="chips"><button class="chip" data-v="check">需要查证</button><button class="chip" data-v="opinion">这是观点</button></div><div class="feedback" id="feedback">第 ${n+1} / 3 案</div>`;card.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{if(b.dataset.v===cases[n][1]){b.classList.add('on');$('feedback').textContent=cases[n][2]+(n===2?' 下一步去书、可靠网站或可信任大人那里找证据。':'');if(n<2)setTimeout(()=>{n++;show()},1050)}else $('feedback').textContent='再想：这是能查的事实，还是“我觉得”？'})};show()}
    function bindPrivacy(){const items=[['我喜欢恐龙','safe'],['我的住址是……','never'],['网上的人让我瞒着大人','adult'],['妈妈的银行卡照片','never']];let n=0;const show=()=>{const card=$('privacyCard');if(!card)return;card.innerHTML=`<h3>${items[n][0]}</h3><div class="chips"><button class="chip" data-v="safe">可以说</button><button class="chip" data-v="adult">先找大人</button><button class="chip" data-v="never">不分享</button></div><div class="feedback" id="feedback">第 ${n+1} / 4 条</div>`;card.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{if(b.dataset.v===items[n][1]){b.classList.add('on');$('feedback').textContent='放对了！';if(n<3)setTimeout(()=>{n++;show()},800)}else $('feedback').textContent='想想身份、位置、金钱和危险。'})};show()}
    function bindPrompt(){const groups=$('toolBody').querySelectorAll('[data-group]');const selected=()=>[...groups].map(g=>g.querySelector('.chip.on')?.dataset.value);const buildAnswer=(goal,who,how,better)=>{const facts=goal==='恐龙'?(better?['霸王龙用两条腿走路','三角龙头上有角','腕龙的脖子很长']:['恐龙很大','恐龙生活在很久以前','后来许多恐龙灭绝了']):(better?['海豚用肺呼吸','海豚会用声音找方向','小海豚喝妈妈的奶']:['海豚住在海里','海豚会游得很快','海豚常常一起活动']);if(how==='最后考我')return `讲给${who}：${facts.slice(0,2).join('；')}。问题：${goal==='恐龙'?(better?'三角龙头上有什么？':'恐龙生活在什么时候？'):(better?'海豚用什么呼吸？':'海豚住在哪里？')}`;return `讲给${who}，正好三句话：${facts.map(x=>`${x}。`).join('')}`};const showResult=()=>{const [goal,who,how]=selected();if(!goal||!who||!how)return;$('promptResult').hidden=false;$('promptAnswer').textContent=buildAnswer(goal,who,how,false);$('improvePrompt').disabled=false;$('improvePrompt').textContent=how==='最后考我'?'补一句：问题要考具体特点':'补一句：每句话给一个具体特点';$('feedback').textContent='结果出来了，但还有点笼统。你想补什么要求？'};groups.forEach(g=>g.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{g.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');const picked=selected().filter(Boolean).length;if(picked===3)showResult();else $('feedback').textContent=`还差 ${3-picked} 块积木。`}));$('improvePrompt').onclick=()=>{const [goal,who,how]=selected();$('promptAnswer').textContent=buildAnswer(goal,who,how,true);$('improvePrompt').disabled=true;$('improvePrompt').textContent='✓ 要求补清楚了';$('feedback').textContent='第二次更具体了！现在请孩子不用照抄，用自己的话讲回来。'}}
    function bindProject(){const samples={story:{title:'毛球雨天记',bad:'毛球冒着大雨出门，却说今天阳光灿烂。',good:'毛球带上小伞，在雨里踩出三朵水花。'},quiz:{title:'动物小测验',bad:'鲸鱼是哪一类？答案：鱼。',good:'鲸鱼是哪一类？答案：哺乳动物。'},model:{title:'分类小发明',bad:'水果：苹果、香蕉、胡萝卜。',good:'水果：苹果、香蕉。蔬菜：胡萝卜。'}};const artifact=$('projectArtifact'),fixCheck=$('toolBody').querySelector('[data-check="fix"]');const renderArtifact=()=>{const item=samples[state.tool.project];artifact.hidden=false;artifact.innerHTML=`<b>${item.title}</b><p class="${state.tool.fixed?'artifact-good':'artifact-bad'}">${state.tool.fixed?item.good:item.bad}</p><button class="big-btn light" id="fixArtifact" type="button" ${state.tool.fixed?'disabled':''}>${state.tool.fixed?'✓ 已经改好':'我找到问题了，点我改好'}</button>`;$('fixArtifact').onclick=()=>{state.tool.fixed=true;fixCheck.classList.add('on');renderArtifact();updateProject()}};$('toolBody').querySelectorAll('[data-project]').forEach(b=>b.onclick=()=>{$('toolBody').querySelectorAll('[data-project]').forEach(x=>x.classList.remove('on'));b.classList.add('on');state.tool.project=b.dataset.project;state.tool.fixed=false;$('toolBody').querySelectorAll('[data-check]').forEach(x=>x.classList.remove('on'));renderArtifact();updateProject()});$('toolBody').querySelectorAll('[data-check]:not([data-check="fix"])').forEach(b=>b.onclick=()=>{b.classList.toggle('on');updateProject()})}
    function updateProject(){const project=$('toolBody').querySelector('.project.on'),checks=$('toolBody').querySelectorAll('[data-check].on').length;$('feedback').textContent=!project?'先选一个小作品。':!state.tool.fixed?'先看小样：哪一句或哪一类有问题？':checks===3?'证据齐了，请老师亲自打开、试玩，再决定能不能展示。':`问题已经改好，还差 ${3-checks} 项验收证据。`}
    function renderDoodle(){$('localPanel').innerHTML=`<div class="center"><canvas class="doodle" id="doodle" width="880" height="420"></canvas><div class="doodle-actions"><button class="big-btn light" id="clearDoodle">清空</button><button class="big-btn" id="guessDoodle">毛球来猜</button></div><div class="feedback" id="feedback">这是本地规则预演；联网后仍要回到真实 AI 实战。</div></div>`;const c=$('doodle'),ctx=c.getContext('2d');ctx.lineWidth=10;ctx.lineCap='round';ctx.strokeStyle='#2a6a9e';let down=false,strokes=0;const p=e=>{const r=c.getBoundingClientRect();return[(e.clientX-r.left)*c.width/r.width,(e.clientY-r.top)*c.height/r.height]};c.onpointerdown=e=>{down=true;strokes++;ctx.beginPath();ctx.moveTo(...p(e));c.setPointerCapture(e.pointerId)};c.onpointermove=e=>{if(down){ctx.lineTo(...p(e));ctx.stroke()}};c.onpointerup=()=>down=false;$('clearDoodle').onclick=()=>{ctx.clearRect(0,0,c.width,c.height);strokes=0};$('guessDoodle').onclick=()=>$('feedback').textContent=strokes<3?'毛球猜：太阳？再多画几笔。':strokes<7?'毛球猜：猫或鱼？':'毛球猜了一个答案——自信不等于正确！'}
    function renderDots(slides){$('dots').innerHTML=slides.map((_,i)=>`<button class="dot ${i<state.slide?'done':''} ${i===state.slide?'active':''}" data-go="${i}" aria-label="第 ${i+1} 页"></button>`).join('');$('dots').querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{state.slide=+b.dataset.go;render()})}
    $('prevBtn').onclick=()=>{if(state.slide>0){state.slide--;render()}};$('nextBtn').onclick=()=>{const l=lessons[state.lesson],slides=makeSlides(l);if(state.slide<slides.length-1){state.slide++;render();return}state.done.add(l.id);save();if(l.id<10)openLesson(l.id+1);else home()};$('homeBtn').onclick=home;$('rehearsalBtn').onclick=()=>{state.rehearsal=!state.rehearsal;save();renderMap()};$('teacherBtn').onclick=()=>{$('teacherPanel').hidden=!$('teacherPanel').hidden};$('closeTeacher').onclick=()=>$('teacherPanel').hidden=true;$('fullBtn').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();addEventListener('keydown',e=>{if($('deck').hidden)return;if(e.key==='ArrowRight')$('nextBtn').click();if(e.key==='ArrowLeft')$('prevBtn').click();if(e.key.toLowerCase()==='s')$('teacherBtn').click();if(e.key==='Escape')$('teacherPanel').hidden=true});
    let x=0;$('stage').addEventListener('touchstart',e=>x=e.changedTouches[0].clientX,{passive:true});$('stage').addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-x;if(Math.abs(d)>70)(d<0?$('nextBtn'):$('prevBtn')).click()},{passive:true});
    function routeFromHash(){if(location.hash==='#home'){if(!$('deck').hidden)home();return}const m=location.hash.match(/^#lesson-(\d{2})-slide-(\d+)$/);if(!m)return;const lesson=Math.max(1,Math.min(10,+m[1])),slide=Math.max(0,Math.min(8,+m[2]-1));if(!$('deck').hidden&&state.lesson===lesson-1&&state.slide===slide)return;state.lesson=lesson-1;state.slide=slide;state.tool={};$('mapScreen').hidden=true;$('deck').hidden=false;render()}
    addEventListener('hashchange',routeFromHash);renderMap();routeFromHash()
  })();
  </script>
